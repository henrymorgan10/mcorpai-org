<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Vanilla JS Mini-Game Lab V3.6</title>
<!-- ============================================================
     Vanilla JS Mini-Game Lab V3.6 (single-file build)
     - 외부 라이브러리/네트워크/에셋 의존 0개. 순수 HTML/CSS/JS/WebAudio.
     - 파일을 저장한 뒤 브라우저에서 직접 열면 실행됩니다.
     - 게임 UI 스타일은 #vgl-root 스코프로 격리되어 있습니다.
============================================================ -->

<style>
  #vgl-root {
    --vgl-bg: #080b14;
    --vgl-panel: rgba(19, 24, 41, 0.86);
    --vgl-line: rgba(255, 255, 255, 0.1);
    --vgl-text: #f7f8ff;
    --vgl-muted: #9ba5c1;
    --vgl-cyan: #51e6ff;
    --vgl-violet: #a57cff;
    --vgl-lime: #77f2a1;
    --vgl-yellow: #ffd166;
    --vgl-red: #ff6b83;
    --vgl-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);

    position: relative;
    width: min(1180px, calc(100% - 16px));
    min-height: calc(100vh - 16px);
    margin: 8px auto;
    box-shadow: 0 0 0 100vmax #05070d;
    clip-path: inset(0 -100vmax);
    color: var(--vgl-text);
    font-family: Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 12% 8%, rgba(81, 230, 255, 0.13), transparent 28rem),
      radial-gradient(circle at 88% 12%, rgba(165, 124, 255, 0.15), transparent 30rem),
      linear-gradient(145deg, #070912, #0b1020 55%, #090c16);
    border-radius: 28px;
    overflow: hidden;
  }
  #vgl-root *, #vgl-root *::before, #vgl-root *::after { box-sizing: border-box; }
  #vgl-root button, #vgl-root input { font: inherit; }
  #vgl-root button { color: inherit; }

  #vgl-root .vgl-inner { padding: 22px 22px 30px; position: relative; z-index: 1; }

  #vgl-root .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  #vgl-root .brand-mark {
    width: 42px; height: 42px; display: grid; place-items: center;
    border: 1px solid rgba(255,255,255,.13); border-radius: 14px;
    background: linear-gradient(135deg, rgba(81,230,255,.18), rgba(165,124,255,.22));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.12); font-weight: 900;
  }
  #vgl-root .title-wrap { flex: 1; min-width: 0; }
  #vgl-root .eyebrow { color: var(--vgl-cyan); font-size: 12px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; margin-bottom: 3px; }
  #vgl-root h1 { margin: 0; font-size: clamp(20px, 3.5vw, 30px); letter-spacing: -.04em; }
  #vgl-root .subtitle { margin: 5px 0 0; color: var(--vgl-muted); font-size: 14px; }

  #vgl-root .ghost-button, #vgl-root .primary-button, #vgl-root .danger-button, #vgl-root .soft-button, #vgl-root .icon-button {
    border: 0; border-radius: 13px; padding: 11px 15px; cursor: pointer;
    transition: transform .16s ease, background .16s ease, border-color .16s ease, opacity .16s ease;
    font-weight: 800;
  }
  #vgl-root .ghost-button:hover, #vgl-root .primary-button:hover, #vgl-root .danger-button:hover,
  #vgl-root .soft-button:hover, #vgl-root .icon-button:hover { transform: translateY(-1px); }
  #vgl-root .ghost-button { background: rgba(255,255,255,.055); border: 1px solid var(--vgl-line); }
  #vgl-root .primary-button { color: #071016; background: linear-gradient(135deg, var(--vgl-cyan), #9af3ff); box-shadow: 0 8px 26px rgba(81,230,255,.2); }
  #vgl-root .danger-button { background: rgba(255,107,131,.14); border: 1px solid rgba(255,107,131,.32); }
  #vgl-root .soft-button { background: rgba(165,124,255,.13); border: 1px solid rgba(165,124,255,.28); }
  #vgl-root .icon-button { background: rgba(255,255,255,.055); border: 1px solid var(--vgl-line); width: 42px; height: 42px; display: grid; place-items: center; padding: 0; font-size: 17px; }
  #vgl-root button:disabled { cursor: not-allowed; opacity: .45; transform: none !important; }
  #vgl-root #vglBackButton { display: none; white-space: nowrap; }

  #vgl-root .screen {
    min-height: 660px; border: 1px solid var(--vgl-line); border-radius: 24px;
    background: rgba(8, 12, 24, .68); box-shadow: var(--vgl-shadow);
    overflow: hidden; position: relative;
  }
  /* 화면 흔들림 (게임 주스) */
  #vgl-root .screen.shake { animation: vglShake .32s cubic-bezier(.36,.07,.19,.97); }
  @keyframes vglShake {
    10%,90% { transform: translateX(-2px); } 20%,80% { transform: translateX(4px); }
    30%,50%,70% { transform: translateX(-7px); } 40%,60% { transform: translateX(7px); }
  }
  #vgl-root .screen.shake-soft { animation: vglShakeSoft .2s ease; }
  @keyframes vglShakeSoft { 25% { transform: translateY(-3px); } 75% { transform: translateY(3px); } }

  #vgl-root .menu { padding: clamp(20px, 3.5vw, 38px); }
  #vgl-root .menu-intro { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
  #vgl-root .menu-intro h2 { margin: 0 0 8px; font-size: clamp(24px, 3.6vw, 40px); letter-spacing: -.05em; }
  #vgl-root .menu-intro p { margin: 0; color: var(--vgl-muted); line-height: 1.65; }
  #vgl-root .menu-badge { flex: 0 0 auto; padding: 9px 12px; border-radius: 999px; border: 1px solid rgba(119,242,161,.25); background: rgba(119,242,161,.08); color: var(--vgl-lime); font-size: 12px; font-weight: 800; }

  #vgl-root .game-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
  #vgl-root .game-card {
    min-height: 286px; position: relative; overflow: hidden; border-radius: 23px;
    border: 1px solid var(--vgl-line); padding: 24px;
    background: linear-gradient(150deg, rgba(255,255,255,.075), rgba(255,255,255,.025));
    display: flex; flex-direction: column; isolation: isolate;
    transition: transform .18s ease, border-color .18s ease;
  }
  #vgl-root .game-card::before {
    content: ""; position: absolute; width: 230px; height: 230px; border-radius: 50%;
    right: -85px; top: -95px; background: var(--glow); filter: blur(15px); opacity: .34; z-index: -1;
  }
  #vgl-root .game-card:hover { border-color: rgba(255,255,255,.2); transform: translateY(-3px); }
  #vgl-root .game-icon { width: 46px; height: 46px; display: grid; place-items: center; border-radius: 15px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1); font-size: 22px; margin-bottom: 16px; }
  #vgl-root .game-card h3 { margin: 0 0 10px; font-size: 22px; letter-spacing: -.035em; }
  #vgl-root .game-card p { margin: 0; color: var(--vgl-muted); line-height: 1.58; font-size: 14px; }
  #vgl-root .game-meta { display: flex; flex-wrap: wrap; gap: 7px; margin: 14px 0 14px; }
  #vgl-root .chip { padding: 6px 9px; border-radius: 999px; background: rgba(255,255,255,.055); color: #c9d0e7; font-size: 11px; border: 1px solid rgba(255,255,255,.07); }
  #vgl-root .best-line { margin-top: auto; display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--vgl-yellow); margin-bottom: 12px; min-height: 17px; }
  #vgl-root .best-line.none { color: #6f7891; }
  #vgl-root .game-card .launch { width: 100%; }

  #vgl-root .game-page { padding: clamp(16px, 3vw, 28px); }
  #vgl-root .game-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 16px; }
  #vgl-root .game-heading h2 { margin: 0 0 7px; font-size: clamp(22px, 3.6vw, 32px); letter-spacing: -.045em; }
  #vgl-root .game-heading p { margin: 0; color: var(--vgl-muted); line-height: 1.55; }
  #vgl-root .game-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 9px; }

  #vgl-root .hud { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
  #vgl-root .hud-item { border: 1px solid var(--vgl-line); background: rgba(255,255,255,.045); border-radius: 15px; padding: 12px 14px; position: relative; overflow: hidden; }
  #vgl-root .hud-label { color: var(--vgl-muted); font-size: 11px; margin-bottom: 4px; }
  #vgl-root .hud-value { font-size: 18px; font-weight: 900; letter-spacing: -.02em; transition: color .15s ease; }
  #vgl-root .hud-value.bump { animation: vglBump .28s ease; }
  @keyframes vglBump { 40% { transform: scale(1.28); } }

  #vgl-root .notice { border: 1px solid rgba(81,230,255,.18); background: rgba(81,230,255,.065); color: #c8f8ff; border-radius: 15px; padding: 11px 14px; font-size: 13px; line-height: 1.5; margin-bottom: 14px; }

  /* 콤보 배지 */
  #vgl-root .combo-badge {
    position: absolute; top: 12px; right: 14px; z-index: 30;
    padding: 8px 14px; border-radius: 999px; font-weight: 1000; font-size: 15px;
    background: linear-gradient(135deg, var(--vgl-yellow), #ffb347); color: #2a1800;
    box-shadow: 0 8px 24px rgba(255,179,71,.4); opacity: 0; transform: translateY(-8px) scale(.8);
    transition: opacity .15s ease, transform .15s ease; pointer-events: none;
  }
  #vgl-root .combo-badge.show { opacity: 1; transform: translateY(0) scale(1); }
  #vgl-root .combo-badge.pop { animation: vglComboPop .26s ease; }
  @keyframes vglComboPop { 40% { transform: translateY(0) scale(1.22); } }

  /* 파티클 오버레이 */
  #vgl-root .vgl-fx { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }

  /* 결과 카드 */
  #vgl-root .result-layer { position: absolute; inset: 0; z-index: 300; display: grid; place-items: center; padding: 24px; background: rgba(5, 7, 14, .8); backdrop-filter: blur(10px); animation: vglFadeIn .2s ease; }
  #vgl-root .result-card { width: min(440px, 100%); text-align: center; border: 1px solid var(--vgl-line); border-radius: 24px; background: linear-gradient(155deg, rgba(31,39,63,.97), rgba(14,18,32,.98)); padding: 28px; box-shadow: var(--vgl-shadow); animation: vglResultIn .32s cubic-bezier(.2,.9,.2,1.2); }
  @keyframes vglResultIn { from { transform: scale(.86) translateY(14px); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #vgl-root .result-card .result-icon { font-size: 42px; margin-bottom: 12px; }
  #vgl-root .result-card h3 { margin: 0 0 9px; font-size: 27px; }
  #vgl-root .result-card p { margin: 0 0 14px; color: var(--vgl-muted); line-height: 1.6; }
  #vgl-root .result-score { font-size: 34px; font-weight: 1000; letter-spacing: -.03em; margin: 0 0 6px; }
  #vgl-root .result-best { font-size: 13px; color: var(--vgl-muted); margin: 0 0 18px; }
  #vgl-root .result-best .new { color: var(--vgl-yellow); font-weight: 900; }
  #vgl-root .result-actions { display: flex; justify-content: center; flex-wrap: wrap; gap: 9px; }
  @keyframes vglFadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* 1. 가짜 알림 지옥 */
  #vgl-root .notification-desk { height: 500px; position: relative; overflow: hidden; border: 1px solid var(--vgl-line); border-radius: 20px;
    background: linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px), radial-gradient(circle at 50% 40%, rgba(165,124,255,.09), transparent 22rem), #0a0e19;
    background-size: 28px 28px, 28px 28px, auto, auto; }
  #vgl-root .desk-watermark { position: absolute; inset: 0; display: grid; place-items: center; color: rgba(255,255,255,.035); font-size: clamp(34px, 9vw, 90px); font-weight: 1000; letter-spacing: -.06em; pointer-events: none; user-select: none; }
  #vgl-root .notification-card { position: absolute; width: min(290px, calc(100% - 18px)); min-height: 112px; border-radius: 16px; border: 1px solid rgba(255,255,255,.14); background: rgba(24, 30, 48, .96); box-shadow: 0 15px 40px rgba(0,0,0,.34); overflow: hidden; user-select: none; animation: vglPopNote .24s cubic-bezier(.2,.9,.2,1.2); }
  @keyframes vglPopNote { from { transform: scale(.85) translateY(12px); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #vgl-root .notification-card.important { border-color: rgba(119,242,161,.55); box-shadow: 0 0 0 1px rgba(119,242,161,.08), 0 15px 40px rgba(0,0,0,.34); }
  #vgl-root .notification-card.warning { border-color: rgba(255,209,102,.38); }
  #vgl-root .notification-card.bomb { border-color: rgba(255,107,131,.7); box-shadow: 0 0 0 1px rgba(255,107,131,.18), 0 15px 40px rgba(0,0,0,.4); animation: vglPopNote .24s cubic-bezier(.2,.9,.2,1.2), vglBombPulse 1s ease-in-out infinite .24s; }
  @keyframes vglBombPulse { 50% { box-shadow: 0 0 0 3px rgba(255,107,131,.28), 0 15px 40px rgba(0,0,0,.4); } }
  #vgl-root .note-head { display: flex; align-items: center; gap: 8px; height: 38px; padding: 0 8px 0 11px; background: rgba(255,255,255,.05); cursor: grab; touch-action: none; }
  #vgl-root .note-head:active { cursor: grabbing; }
  #vgl-root .note-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--vgl-cyan); box-shadow: 0 0 12px currentColor; }
  #vgl-root .important .note-dot { background: var(--vgl-lime); }
  #vgl-root .warning .note-dot { background: var(--vgl-yellow); }
  #vgl-root .bomb .note-dot { background: var(--vgl-red); }
  #vgl-root .note-app { flex: 1; min-width: 0; font-size: 11px; color: #c8d0e8; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #vgl-root .note-close { position: relative; width: 26px; height: 24px; padding: 0; border-radius: 8px; border: 0; background: rgba(255,255,255,.07); cursor: pointer; transition: transform .12s ease, left .12s ease, top .12s ease; }
  #vgl-root .note-close:hover { background: rgba(255,107,131,.22); }
  #vgl-root .note-body { padding: 12px 13px 14px; }
  #vgl-root .note-title { font-size: 14px; font-weight: 900; margin-bottom: 5px; }
  #vgl-root .note-copy { color: var(--vgl-muted); font-size: 12px; line-height: 1.45; }
  #vgl-root .note-tag { display: inline-block; margin-top: 9px; padding: 4px 7px; border-radius: 999px; font-size: 10px; background: rgba(255,255,255,.06); color: #cad2e8; }
  #vgl-root .note-fuse { position: absolute; left: 0; bottom: 0; height: 3px; width: 100%; background: rgba(255,107,131,.25); }
  #vgl-root .note-fuse > span { display: block; height: 100%; width: 100%; background: var(--vgl-red); transform-origin: left; }

  /* 2. 에코 */
  #vgl-root .canvas-wrap { border: 1px solid var(--vgl-line); border-radius: 20px; overflow: hidden; background: #080c17; position: relative; }
  #vgl-root #vglEchoCanvas { display: block; width: 100%; height: auto; aspect-ratio: 18 / 11; touch-action: none; }
  #vgl-root .echo-controls { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 14px; margin-top: 14px; }
  #vgl-root .key-help { color: var(--vgl-muted); font-size: 13px; line-height: 1.55; }
  #vgl-root .dpad { display: grid; grid-template-columns: repeat(3, 42px); grid-template-rows: repeat(2, 42px); gap: 5px; }
  #vgl-root .dpad button { border: 1px solid var(--vgl-line); background: rgba(255,255,255,.055); border-radius: 11px; cursor: pointer; touch-action: none; }
  #vgl-root .dpad button:active { background: rgba(81,230,255,.2); }
  #vgl-root .dpad button[data-key="ArrowUp"] { grid-column: 2; }
  #vgl-root .dpad button[data-key="ArrowLeft"] { grid-column: 1; grid-row: 2; }
  #vgl-root .dpad button[data-key="ArrowDown"] { grid-column: 2; grid-row: 2; }
  #vgl-root .dpad button[data-key="ArrowRight"] { grid-column: 3; grid-row: 2; }

  /* 3. DOM 감염 */
  #vgl-root .dom-board-wrap { border: 1px solid var(--vgl-line); border-radius: 20px; padding: 15px; background: radial-gradient(circle at 50% 50%, rgba(119,242,161,.06), transparent 22rem), #090d17; }
  #vgl-root .dom-grid { display: grid; grid-template-columns: repeat(7, minmax(64px, 1fr)); gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  #vgl-root .dom-node { min-width: 64px; height: 66px; border: 1px solid rgba(255,255,255,.09); border-radius: 13px; background: rgba(255,255,255,.035); color: #aeb8d3; cursor: not-allowed; position: relative; transition: transform .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease; padding: 7px; }
  #vgl-root .dom-node .tag { font-weight: 900; font-size: 12px; }
  #vgl-root .dom-node .cost { display: block; margin-top: 5px; font-size: 10px; color: #737e9a; }
  #vgl-root .dom-node.eligible { cursor: pointer; border-color: rgba(81,230,255,.48); background: rgba(81,230,255,.075); box-shadow: inset 0 0 0 1px rgba(81,230,255,.08); animation: vglPulseEligible 1.25s ease-in-out infinite; }
  #vgl-root .dom-node.eligible:hover { transform: translateY(-2px); }
  #vgl-root .dom-node.infected { cursor: default; color: #09130d; border-color: rgba(119,242,161,.85); background: linear-gradient(145deg, #77f2a1, #b5ffc9); box-shadow: 0 0 24px rgba(119,242,161,.2); }
  #vgl-root .dom-node.infected.just { animation: vglInfectPunch .3s cubic-bezier(.2,.9,.2,1.4); }
  @keyframes vglInfectPunch { 40% { transform: scale(1.18); } }
  #vgl-root .dom-node.target:not(.infected) { border-color: rgba(255,209,102,.55); color: var(--vgl-yellow); }
  #vgl-root .dom-node.denied { animation: vglShakeNode .25s ease; }
  @keyframes vglPulseEligible { 50% { box-shadow: 0 0 20px rgba(81,230,255,.16); } }
  @keyframes vglShakeNode { 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
  #vgl-root .dom-legend { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
  #vgl-root .legend-item { padding: 7px 9px; background: rgba(255,255,255,.045); border: 1px solid var(--vgl-line); border-radius: 10px; color: #b9c2da; font-size: 11px; }
  #vgl-root .meter { height: 9px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.07); margin-top: 7px; }
  #vgl-root .meter > span { display: block; height: 100%; width: 0; border-radius: inherit; transition: width .2s ease; background: linear-gradient(90deg, var(--vgl-yellow), var(--vgl-red)); }

  /* 4. 보지 마세요 */
  #vgl-root .stealth-room { border: 1px solid var(--vgl-line); border-radius: 20px; background: radial-gradient(circle at 50% 30%, rgba(81,230,255,.06), transparent 25rem), #090d17; padding: clamp(16px, 3vw, 28px); position: relative; overflow: hidden; }
  #vgl-root .watcher { width: 92px; height: 44px; margin: 0 auto 42px; border: 2px solid rgba(255,107,131,.75); border-radius: 70% 20% / 70% 20%; transform: rotate(45deg); display: grid; place-items: center; box-shadow: 0 0 35px rgba(255,107,131,.2); transition: border-color .2s ease, box-shadow .2s ease; }
  #vgl-root .watcher.alert { border-color: rgba(255,107,131,1); box-shadow: 0 0 50px rgba(255,107,131,.5); }
  #vgl-root .watcher .pupil { width: 22px; height: 22px; border-radius: 50%; background: var(--vgl-red); box-shadow: 0 0 20px var(--vgl-red); transition: transform .1s linear; }
  #vgl-root .stealth-track { height: 120px; position: relative; margin: 0 12px 24px; border-bottom: 3px solid rgba(255,255,255,.16); }
  #vgl-root .cover { position: absolute; bottom: 0; height: 62px; border-radius: 8px 8px 0 0; background: linear-gradient(180deg, #3a4563, #222a40); border: 1px solid rgba(255,255,255,.12); transform: translateX(-50%); min-width: 28px; }
  #vgl-root .cover::after { content: "SAFE"; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: var(--vgl-lime); font-size: 9px; font-weight: 900; }
  #vgl-root .finish-line { position: absolute; right: 1%; bottom: 0; height: 102px; width: 5px; background: repeating-linear-gradient(180deg, white 0 8px, #111 8px 16px); box-shadow: 0 0 16px rgba(255,255,255,.3); }
  #vgl-root .stealth-player { --x: 5%; position: absolute; left: var(--x); bottom: 3px; width: 24px; height: 36px; border-radius: 50% 50% 40% 40%; transform: translateX(-50%); background: var(--vgl-cyan); box-shadow: 0 0 22px rgba(81,230,255,.45); transition: left .22s ease; z-index: 4; }
  #vgl-root .stealth-player::after { content: ""; position: absolute; width: 31px; height: 18px; border-radius: 50%; background: rgba(0,0,0,.28); left: 50%; bottom: -9px; transform: translateX(-50%); filter: blur(4px); z-index: -1; }
  #vgl-root .stealth-status { text-align: center; min-height: 48px; color: #dce3f6; font-weight: 800; line-height: 1.5; }
  #vgl-root .conceal-button { width: min(420px, 100%); min-height: 74px; display: block; margin: 14px auto 0; border-radius: 18px; border: 1px solid rgba(165,124,255,.4); background: linear-gradient(145deg, rgba(165,124,255,.18), rgba(81,230,255,.08)); cursor: pointer; font-weight: 900; touch-action: none; color: var(--vgl-text); }
  #vgl-root .conceal-button:active { background: linear-gradient(145deg, rgba(165,124,255,.32), rgba(81,230,255,.16)); }

  #vgl-root .blackout { position: fixed; inset: 0; z-index: 9999; display: none; place-items: center; background: #000; color: #171717; font-size: clamp(20px, 5vw, 44px); font-weight: 1000; user-select: none; cursor: pointer; flex-direction: column; gap: 10px; }
  #vgl-root .blackout small { color: #2a2a2a; font-size: 15px; }

<body>
<div id="vgl-root">
  <div class="vgl-inner">
    <header class="topbar">
      <div class="brand-mark">V3.6</div>
      <div class="title-wrap">
        <div class="eyebrow" id="vglEyebrow">Single-file · private on-device play</div>
        <h1 id="vglAppTitle">Vanilla JS Mini-Game Lab</h1>
        <p class="subtitle" id="vglAppSubtitle">Five experiments, one private browser-only file.</p>
      </div>
      <div class="top-controls">
        <button class="daily-button" id="vglDailyButton" type="button" aria-pressed="false">Daily · OFF</button>
        <select class="difficulty-select" id="vglDifficulty" aria-label="Difficulty"></select>
        <select class="language-select" id="vglLanguage" aria-label="Language">
          <option value="en">EN</option>
          <option value="ko">한국어</option>
          <option value="ja">日本語</option>
          <option value="es">Español</option>
          <option value="ar">العربية</option>
        </select>
        <button class="icon-button" id="vglSoundButton" type="button" title="Sound on/off" aria-label="Sound toggle">♪</button>
        <button class="ghost-button" id="vglBackButton" type="button">← Games</button>
      </div>
    </header>

    <main class="screen" id="vglScreen" aria-live="polite"></main>
    <canvas class="vgl-fx" id="vglFx" aria-hidden="true"></canvas>
  </div>

  <div class="blackout" id="vglBlackout"><span id="vglBlackoutMain">Moving while you look away…</span><small id="vglBlackoutSmall">Release or tap the screen to stop</small></div>
</div>

<script>
(() => {
  'use strict';

  const root = document.getElementById('vgl-root');
  if (!root || root.dataset.booted === '1') return;
  root.dataset.booted = '1';

  const $ = (sel) => root.querySelector(sel);
  const screen = $('#vglScreen');
  const appTitle = $('#vglAppTitle');
  const appSubtitle = $('#vglAppSubtitle');
  const backButton = $('#vglBackButton');
  const soundButton = $('#vglSoundButton');
  const dailyButton = $('#vglDailyButton');
  const difficultySelect = $('#vglDifficulty');
  const languageSelect = $('#vglLanguage');
  const eyebrowEl = $('#vglEyebrow');
  const blackout = $('#vglBlackout');
  const blackoutMain = $('#vglBlackoutMain');
  const blackoutSmall = $('#vglBlackoutSmall');
  const fxCanvas = $('#vglFx');
  const nativeRandom = Math.random.bind(Math);

  /* ============================================================
     공통 엔진 A — 절차적 사운드 (WebAudio, 외부 파일 0개)
  ============================================================ */
  const Sfx = (() => {
    let ctx = null;
    let enabled = true;
    let master = null;
    let warmFilter = null;
    let sfxBus = null;
    let musicBus = null;
    let scene = 'menu';
    let schedulerId = 0;
    let nextNoteTime = 0;
    let musicStep = 0;
    let ducked = false;

    const scenes = {
      menu: {
        bpm: 94, root: 220,
        lead: [0, null, 7, null, 12, null, 7, null, 3, null, 10, null, 7, null, 5, null],
        bass: [-12, null, -12, null, -5, null, -7, null]
      },
      notifications: {
        bpm: 132, root: 220,
        lead: [0, 7, 12, 7, 3, 10, 15, 10, 0, 7, 12, 15, 10, 7, 3, 7],
        bass: [-12, null, -12, null, -9, null, -7, null]
      },
      echo: {
        bpm: 104, root: 196,
        lead: [0, null, 7, 12, null, 7, 3, null, 0, null, 10, 7, null, 3, 5, null],
        bass: [-12, null, -5, null, -9, null, -5, null]
      },
      infection: {
        bpm: 118, root: 164.81,
        lead: [0, 3, 7, null, 10, 7, 3, null, 0, 3, 12, 10, 7, 3, null, 3],
        bass: [-12, null, -7, null, -5, null, -7, null]
      },
      unseen: {
        bpm: 78, root: 146.83,
        lead: [0, null, null, 7, null, 3, null, null, 0, null, 10, null, 7, null, 3, null],
        bass: [-12, null, null, null, -5, null, null, null]
      },
      aiduel: {
        bpm: 112, root: 174.61,
        lead: [0, null, 7, 10, null, 3, 7, null, 0, 12, 10, null, 7, 3, null, 5],
        bass: [-12, null, -5, null, -7, null, -5, null]
      }
    };

    function ensure() {
      if (ctx) return ctx;
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctx = new AC();
        master = ctx.createGain();
        warmFilter = ctx.createBiquadFilter();
        warmFilter.type = 'lowpass';
        warmFilter.frequency.value = 5200;
        warmFilter.Q.value = 0.72;
        sfxBus = ctx.createGain();
        musicBus = ctx.createGain();
        master.gain.value = 0.52;
        sfxBus.gain.value = 0.84;
        musicBus.gain.value = 0.20;
        sfxBus.connect(master);
        musicBus.connect(master);
        master.connect(warmFilter);
        warmFilter.connect(ctx.destination);
        nextNoteTime = ctx.currentTime + 0.08;
        schedulerId = window.setInterval(scheduleMusic, 45);
      } catch (e) { ctx = null; }
      return ctx;
    }

    function tone(freq, when, dur, type, vol, bus, slideTo) {
      if (!ctx || !bus) return;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type || 'sine';
      o.frequency.setValueAtTime(Math.max(20, freq), when);
      if (slideTo) {
        try { o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), when + dur); } catch (e) {}
      }
      g.gain.setValueAtTime(0.0001, when);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0002, vol || 0.12), when + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
      o.connect(g).connect(bus);
      o.start(when);
      o.stop(when + dur + 0.03);
    }

    function applyMusicGain() {
      if (!ctx || !musicBus) return;
      const target = enabled ? (ducked ? 0.055 : 0.20) : 0.0001;
      musicBus.gain.cancelScheduledValues(ctx.currentTime);
      musicBus.gain.setTargetAtTime(target, ctx.currentTime, 0.06);
    }

    function scheduleMusic() {
      if (!ctx || !musicBus || ctx.state === 'closed') return;
      const def = scenes[scene] || scenes.menu;
      const stepDuration = 60 / def.bpm / 2;
      if (!nextNoteTime || nextNoteTime < ctx.currentTime - 0.5) nextNoteTime = ctx.currentTime + 0.04;
      while (nextNoteTime < ctx.currentTime + 0.18) {
        const lead = def.lead[musicStep % def.lead.length];
        const bass = def.bass[musicStep % def.bass.length];
        if (enabled && lead !== null) {
          const freq = def.root * Math.pow(2, lead / 12);
          tone(freq, nextNoteTime, stepDuration * 0.62, scene === 'unseen' ? 'sine' : 'square', 0.055, musicBus);
        }
        if (enabled && bass !== null && musicStep % 2 === 0) {
          const freq = def.root * Math.pow(2, bass / 12);
          tone(freq, nextNoteTime, stepDuration * 1.35, 'triangle', 0.075, musicBus);
        }
        if (enabled && musicStep % 4 === 0) {
          tone(scene === 'unseen' ? 54 : 68, nextNoteTime, 0.055, 'sine', 0.065, musicBus, 38);
        }
        musicStep += 1;
        nextNoteTime += stepDuration;
      }
    }

    function resume() {
      const c = ensure();
      if (c && c.state === 'suspended') c.resume().catch(() => {});
      applyMusicGain();
    }

    function blip(freq, dur, type, vol, slideTo) {
      const c = ensure();
      if (!c || !enabled) return;
      tone(freq, c.currentTime, dur, type, vol, sfxBus, slideTo);
    }

    function noise(dur, vol) {
      const c = ensure();
      if (!c || !enabled) return;
      const now = c.currentTime;
      const len = Math.floor(c.sampleRate * dur);
      const buf = c.createBuffer(1, len, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = (nativeRandom() * 2 - 1) * (1 - i / len);
      const src = c.createBufferSource();
      src.buffer = buf;
      const g = c.createGain();
      g.gain.value = vol || 0.12;
      src.connect(g).connect(sfxBus);
      src.start(now);
    }

    /* V3.6 — 음정을 메이저 스케일에 정렬하고, 콤보 상승을 음악적으로 표현.
       알림 alarm 음량을 낮춰 연속 스폰 시 청각 피로를 줄였다. 신규: milestone/danger/countdown/go/perfect/block. */
    const SCALE = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16, 17, 19, 21]; // 장음계 반음 오프셋
    const semis = (base, idx) => base * Math.pow(2, (SCALE[Math.max(0, Math.min(SCALE.length - 1, idx))]) / 12);
    const presets = {
      click:   () => blip(660, 0.055, 'triangle', 0.15, 880),
      pop:     () => blip(520, 0.12, 'sine', 0.2, 220),
      success: () => { blip(523, 0.1, 'triangle', 0.18); setTimeout(() => blip(784, 0.16, 'triangle', 0.2), 90); },
      win:     () => { [523, 659, 784, 1046, 1318].forEach((f, i) => setTimeout(() => blip(f, 0.2, 'triangle', 0.2 - i * 0.012), i * 95)); setTimeout(() => blip(1568, 0.34, 'sine', 0.16), 480); },
      fail:    () => { blip(196, 0.32, 'sawtooth', 0.15, 62); noise(0.2, 0.075); setTimeout(() => blip(147, 0.28, 'sawtooth', 0.12, 70), 110); },
      error:   () => blip(150, 0.18, 'square', 0.13, 90),
      /* 콤보가 오를수록 장음계를 타고 올라가며 옥타브 위 화음을 살짝 얹는다 */
      combo:   (n) => {
        const step = Math.max(0, Math.min(SCALE.length - 1, (Number(n) || 2) - 2));
        const f = semis(440, step);
        blip(f, 0.11, 'triangle', 0.16);
        setTimeout(() => blip(f * 1.5, 0.09, 'sine', 0.09), 38);
      },
      milestone: (n) => {
        const lvl = Math.max(1, Math.floor((Number(n) || 5) / 5));
        [0, 2, 4, 6].forEach((s, i) => setTimeout(() => blip(semis(523, s + lvl), 0.14, 'triangle', 0.17 - i * 0.01), i * 70));
      },
      infect:  () => blip(330, 0.08, 'triangle', 0.14, 520),
      energy:  () => blip(700, 0.07, 'sine', 0.13, 1100),
      alarm:   () => blip(792, 0.07, 'sine', 0.07, 600),
      danger:  () => { blip(440, 0.1, 'square', 0.13, 392); setTimeout(() => blip(392, 0.12, 'square', 0.13, 330), 130); },
      countdown: () => blip(523, 0.1, 'triangle', 0.15),
      go:      () => { blip(659, 0.1, 'triangle', 0.18); setTimeout(() => blip(1046, 0.22, 'triangle', 0.2), 90); },
      step:    () => blip(300, 0.05, 'sine', 0.075),
      reveal:  () => noise(0.12, 0.07),
      block:   () => { blip(220, 0.16, 'square', 0.14, 140); noise(0.09, 0.05); },
      lock:    () => { blip(392, 0.12, 'triangle', 0.18); setTimeout(() => blip(587, 0.16, 'triangle', 0.2), 80); },
      stage:   () => { [392, 523, 659].forEach((f, i) => setTimeout(() => blip(f, 0.15, 'triangle', 0.17), i * 85)); },
      perfect: () => { [523, 659, 784, 1046, 1318, 1568].forEach((f, i) => setTimeout(() => blip(f, 0.16, 'triangle', 0.18), i * 60)); },
      fling:   () => { noise(0.07, 0.05); blip(420, 0.08, 'triangle', 0.11, 760); }
    };

    function play(name, arg) { try { if (presets[name]) presets[name](arg); } catch (e) {} }
    function toggle() {
      ensure();
      enabled = !enabled;
      if (enabled) resume();
      applyMusicGain();
      return enabled;
    }
    function setScene(name) {
      if (scenes[name]) scene = name;
      musicStep = 0;

  const Fx = (() => {
    const ctx = fxCanvas.getContext('2d');
    let particles = [];
    let raf = 0;
    let running = false;

    function resize() {
      const rect = screen.getBoundingClientRect();
      const inner = root.querySelector('.vgl-inner').getBoundingClientRect();
      // fxCanvas는 .vgl-inner 기준 absolute. screen의 위치를 inner 기준 좌표로 맞춤.
      fxCanvas.width = root.querySelector('.vgl-inner').clientWidth;
      fxCanvas.height = root.querySelector('.vgl-inner').clientHeight;
    }
    window.addEventListener('resize', resize);

    function loop() {
      if (!running) return;
      ctx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
      particles = particles.filter((p) => p.life > 0);
      for (const p of particles) {
        p.vy += 0.18;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        ctx.globalAlpha = Math.max(0, p.life / p.max);
        ctx.fillStyle = p.color;
        ctx.save();
        ctx.translate(p.x, p.y);
        if (p.shape === 'square') {
          ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
        } else if (p.shape === 'cross') {
          const thick = Math.max(1, p.r * 0.72);
          ctx.fillRect(-p.r * 1.7, -thick / 2, p.r * 3.4, thick);
          ctx.fillRect(-thick / 2, -p.r * 1.7, thick, p.r * 3.4);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      if (particles.length) raf = requestAnimationFrame(loop);
      else running = false;
    }

    // x,y 는 뷰포트(client) 좌표 → vgl-inner 기준 좌표로 변환
    function burst(clientX, clientY, color, count, shape) {
      if (Motion.reduced()) return;
      resize();
      const innerRect = root.querySelector('.vgl-inner').getBoundingClientRect();
      const x = clientX - innerRect.left;
      const y = clientY - innerRect.top;
      const n = count || 14;
      for (let i = 0; i < n; i++) {
        const ang = nativeRandom() * Math.PI * 2;
        const spd = 1.5 + nativeRandom() * 4.5;
        const life = 26 + Math.floor(nativeRandom() * 18);
        particles.push({
          x, y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd - 1.5,
          r: 1.5 + nativeRandom() * 3,
          color: color || '#51e6ff',
          shape: shape || 'circle',
          life, max: life
        });
      }
      if (!running) { running = true; raf = requestAnimationFrame(loop); }
    }

    function clear() {
      particles = [];
      cancelAnimationFrame(raf);
      running = false;
      ctx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
    }
    return { burst, clear, resize };
  })();

  const RollingNumber = (() => {
    const running = new WeakMap();
    function set(el, target, formatter, duration) {
      if (!el || !Number.isFinite(Number(target))) return;
      const to = Number(target);
      const old = running.get(el);
      if (old) cancelAnimationFrame(old.raf);
      const from = Number(el.dataset.vglRollingValue);
      const startValue = Number.isFinite(from) ? from : to;
      if (!Number.isFinite(from) || Math.abs(to - startValue) < 0.001 || Boolean(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) {
        el.dataset.vglRollingValue = String(to);
        el.textContent = formatter ? formatter(to) : String(to);
        running.delete(el);
        return;
      }
      const started = performance.now();
      const ms = Math.max(80, Number(duration) || 220);
      const state = { raf: 0 };
      const frame = (now) => {
        const p = Math.max(0, Math.min(1, (now - started) / ms));
        const eased = 1 - Math.pow(1 - p, 3);
        const value = startValue + (to - startValue) * eased;
        el.dataset.vglRollingValue = String(value);
        el.textContent = formatter ? formatter(value) : String(value);
        if (p < 1) state.raf = requestAnimationFrame(frame);
        else {
          el.dataset.vglRollingValue = String(to);
          el.textContent = formatter ? formatter(to) : String(to);
          running.delete(el);
        }
      };
      state.raf = requestAnimationFrame(frame);
      running.set(el, state);
    }
    return { set };
  })();

      localStorage.removeItem(k);
    } catch (e) { ok = false; }

    function getRaw(key) {
      try {
        if (ok) {
          const value = localStorage.getItem(PREFIX + key);
          if (value !== null) {
            mem[key] = value;
            return value;
          }
        }
      } catch (e) { ok = false; }
      return Object.prototype.hasOwnProperty.call(mem, key) ? String(mem[key]) : null;
    }
    function setRaw(key, value) {
      const stringValue = String(value);
      try { if (ok) localStorage.setItem(PREFIX + key, stringValue); }
      catch (e) { ok = false; }
      mem[key] = stringValue;
    }
    function get(key) {
      const raw = getRaw(key);
      if (raw === null) return null;
      const number = Number(raw);
      return Number.isFinite(number) ? number : null;
    }
    function set(key, value) { setRaw(key, value); }
    function submit(key, value, lowerIsBetter) {
      const prev = get(key);
      const isNew = prev === null || (lowerIsBetter ? value < prev : value > prev);

  })();

      this.active = false;
      this.transitioning = false;
      this.index = 0;
      this.total = 0;
      this.results = [];
      if (clearFinal !== false) this.finalData = null;
    },
    current() { return this.order[this.index] || ''; },
    shortTarget(base) { return Math.max(1, Math.ceil(Number(base || 1) * this.BALANCE.goalScale)); },
    grade(total) {
      if (total >= this.BALANCE.gradeS) return 'S';
      if (total >= this.BALANCE.gradeA) return 'A';
      if (total >= this.BALANCE.gradeB) return 'B';
      return 'C';
    },
    points(result) {
      const game = result.game;
      const stats = result.stats || {};
      const win = Boolean(result.win);
      const raw = Math.max(0, Number(result.score) || 0);
      let progress = 0;
      let bonus = 0;
      if (game === 'notifications') {
        progress = Number(stats.cleaned) / Math.max(1, Number(stats.goal) || 1);
        bonus = Math.min(360, raw / 10);
      } else if (game === 'echo') {
        progress = Number(stats.stages) / Math.max(1, Number(stats.totalStages) || 1);
        bonus = win ? Math.max(0, 360 - (Number(stats.totalLoops) || 0) * 22) : 0;
      } else if (game === 'infection') {
        progress = win ? 1 : Number(stats.infected) / 10;
        bonus = win ? Math.max(0, 300 - Number(stats.scan || 0) * 2) : 0;
      } else if (game === 'unseen') {
        progress = Number(stats.position) / Math.max(1, Number(stats.goalPosition) || 100);
        bonus = win ? Math.max(0, 320 - raw * 8) : 0;
      } else if (game === 'aiduel') {
        progress = Number(stats.you) / Math.max(1, Number(stats.target) || 1);
        bonus = Math.max(0, ((Number(stats.you) || 0) - (Number(stats.ai) || 0)) * 22);
      }
      progress = Math.max(0, Math.min(1, Number.isFinite(progress) ? progress : 0));
      bonus = Number.isFinite(bonus) ? bonus : 0;
      const value = Math.round((progress * 520 + (win ? 360 : 0) + bonus) * Difficulty.relayMultiplier());
      return Number.isFinite(value) ? Math.max(0, Math.min(this.BALANCE.maxGamePoints, value)) : 0;
    },
    decorate() {
      if (!this.active || this.transitioning) return;
      const page = screen.querySelector('.game-page');
      if (!page || page.querySelector('.relay-strip')) return;
      const dots = this.order.map((game, index) => `<span class="relay-dot ${index < this.index ? 'done' : index === this.index ? 'current' : ''}" title="${trh(gameInfo[game].title)}"></span>`).join('');
      page.insertAdjacentHTML('afterbegin', `<div class="relay-strip" role="status" aria-live="polite">
        <div class="relay-strip-main"><strong>${trh('relay_progress', { current: this.index + 1, total: this.order.length })}</strong>${dots}</div>
        <span class="relay-strip-score">${trh('relay_score', { value: formatNumber(this.total) })}</span>
        <button type="button" class="danger-button" data-relay-skip="1">${trh('relay_skip')}</button>
      </div>`);
      const skip = page.querySelector('[data-relay-skip]');
      if (skip) listen(skip, 'click', () => this.complete({
        game: this.current(), win: false, score: 0, stats: { skipped: true },
        title: t('relay_skipped'), text: t('relay_next')
      }));
    },
    complete(result) {
      if (!this.active || this.transitioning) return true;
      this.transitioning = true;
      const game = result.game || this.current();
      const computedPoints = this.points({ ...result, game });
      const points = Number.isFinite(computedPoints) ? computedPoints : 0;
      const entry = { game, win: Boolean(result.win), score: Number(result.score) || 0, points, stats: result.stats || {} };
      this.results.push(entry);
      this.total = Math.max(0, (Number(this.total) || 0) + points);
      cleanupCurrent();
      Sfx.play(entry.win ? 'stage' : 'error');
      const icon = entry.win ? '✓' : '×';
      screen.innerHTML = `<div class="relay-layer"><div class="relay-summary" role="status" aria-live="assertive">
        <div class="relay-summary-icon">${icon}</div>
        <h3>${trh(gameInfo[game].title)}</h3>
        <p>${trh(entry.win ? 'relay_win' : 'relay_loss')}</p>
        <div class="relay-summary-points">${trh('relay_points', { value: formatNumber(points) })}</div>
        <div class="relay-summary-total">${trh('relay_total', { value: formatNumber(this.total) })}</div>
        <p>${trh('relay_next')}</p>
        <div class="relay-progress"><span style="width:${((this.index + 1) / this.order.length) * 100}%"></span></div>
      </div></div>`;
      this.timer = setTimeout(() => {
        this.timer = 0;
        this.index += 1;
        this.transitioning = false;
        if (this.index >= this.order.length) this.finish();
        else openGame(this.order[this.index]);
      }, this.BALANCE.summaryMs);
      return true;
    },
    finish() {
      clearTimeout(this.timer);
      this.timer = 0;
      this.active = false;
      this.transitioning = false;
      currentGame = null;
      const grade = this.grade(this.total);
      const bestInfo = submitDifficultyBest('relay_best', this.total, false);
      this.finalData = { total: this.total, grade, results: this.results.slice(), seed: currentRunSeed, bestInfo, difficulty: Difficulty.current };
      this.renderFinal();
    },
    shareText(data) {
      const rows = data.results.map((entry) => `${entry.win ? '🟩' : '🟥'} ${t(gameInfo[entry.game].title)} +${entry.points}`);
      return [
        t('relay_share_header'),
        data.seed === null ? '' : `🗓️ #${data.seed}`,
        `${t('relay_grade', { grade: data.grade })} · ${t('relay_total', { value: formatNumber(data.total) })}`,
        `⚙️ ${t('difficulty_label')}: ${t(`difficulty_${data.difficulty || Difficulty.current}`)}`,
        ...rows,
        data.seed === null ? '' : `${t('share_challenge')}: ${buildChallengeLink('notifications', data.total)}`,
        t('share_private')
      ].filter(Boolean).join('\n');
    },
    renderFinal() {
      const data = this.finalData;
      if (!data) return showMenu();
      cleanupCurrent();
      Sfx.setScene('menu');
      setHeader(t('relay_title'), t('relay_subtitle'), true);
      refreshTopbarControls();
      const best = data.bestInfo;
      const bestLine = best && best.isNew
        ? `<span class="new">${trh('relay_new_best')}</span> ${trh('relay_previous_best', { value: best.prev === null ? t('result_none') : formatNumber(best.prev) })}`
        : trh('relay_best', { value: formatNumber(best && best.best !== null ? best.best : data.total) });
      const rows = data.results.map((entry) => `<div class="relay-result-row">
        <span>${entry.win ? '✓' : '×'}</span>
        <strong>${trh(gameInfo[entry.game].title)}</strong>
        <span data-relay-state class="${entry.win ? 'win' : 'loss'}">${trh(entry.win ? 'relay_win' : 'relay_loss')}</span>
        <b>+${formatNumber(entry.points)}</b>
      </div>`).join('');
      screen.innerHTML = `<section class="game-page"><div class="relay-final-card">
        <span class="version-note">${trh('relay_title')}</span>
        <span class="difficulty-chip ${(data.difficulty || Difficulty.current) === 'nightmare' ? 'nightmare' : ''}">${trh('difficulty_mode', { difficulty: t(`difficulty_${data.difficulty || Difficulty.current}`) })}</span>
        <h2>${trh('relay_final_title')}</h2>
        <p>${trh('relay_final_desc')}</p>
        <div class="relay-grade" aria-label="${trh('relay_grade', { grade: data.grade })}">${data.grade}</div>
        <div class="relay-final-score">${formatNumber(data.total)}</div>
        <p class="result-best">${bestLine}</p>
        ${data.seed === null ? '' : `<p class="daily-seed">${trh('result_daily_seed', { seed: data.seed })}<br>${trh('result_daily_tomorrow')}</p>`}
        <div class="relay-result-list">${rows}</div>
        <div class="result-actions">
          <button type="button" class="primary-button" data-relay-retry="1">${trh('relay_retry')}</button>
          <button type="button" class="soft-button" data-relay-share="1">${trh('relay_share')}</button>
          <button type="button" class="ghost-button" data-relay-menu="1">${trh('result_menu')}</button>
        </div>
        <p class="result-share-status" aria-live="polite"></p>
      </div></section>`;
      const shareText = this.shareText(data);
      screen.querySelector('[data-relay-retry]')?.addEventListener('click', () => this.start());
      screen.querySelector('[data-relay-menu]')?.addEventListener('click', () => showMenu());
      screen.querySelector('[data-relay-share]')?.addEventListener('click', async () => {
        const ok = await copyResultText(shareText);
        const status = screen.querySelector('.result-share-status');
        if (status) status.textContent = t(ok ? 'share_copied' : 'share_failed');
      });
      enhanceAccessibility();
      scrollRootToTop();
    }
  };

  function showResult({ win, title, text, score, bestInfo, replay, game, stats }) {
    if (RelaySession.active) {
      RelaySession.complete({ win, title, text, score, game: game || currentGame, stats: stats || {} });
      return;
    }
    Sfx.play(win ? 'win' : 'fail');
    haptic(win ? [20, 40, 30] : 80);
    if (win) {
      const rect = screen.getBoundingClientRect();
      Fx.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, '#77f2a1', 40, 'square');
    } else {
      shakeScreen(true);
    }
    const layer = document.createElement('div');
    layer.className = 'result-layer';
    let scoreHtml = '';
    if (typeof score === 'number') scoreHtml += `<p class="result-score" data-result-score="${escapeHtml(score)}">0</p>`;
    if (bestInfo) {
      if (bestInfo.isNew) {
        scoreHtml += `<p class="result-best"><span class="new">${trh('result_new_record')}</span> ${trh('result_prev_best', { value: bestInfo.prev === null ? t('result_none') : formatNumber(bestInfo.prev) })}</p>`;
      } else {
        scoreHtml += `<p class="result-best">${trh('result_best', { value: bestInfo.best === null ? t('result_none') : formatNumber(bestInfo.best) })}</p>`;
      }
    }
    const seedHtml = currentRunSeed === null ? '' : `<p class="daily-seed">${trh(DailyChallenge.isShared() ? 'result_shared_seed' : 'result_daily_seed', { seed: String(currentRunSeed) })}<br>${trh('result_daily_tomorrow')}</p>`;
    const shareText = buildShareText({ win, title, score, game: game || currentGame, stats });
    layer.innerHTML = `
      <div class="result-card" role="dialog" aria-modal="true" aria-labelledby="vglResultTitle">
        <div class="result-icon">${win ? '✓' : '×'}</div>
        <h3 id="vglResultTitle">${escapeHtml(title)}</h3>
        <p>${escapeHtml(text)}</p>
        ${scoreHtml}
        ${seedHtml}
        <div class="result-actions">
          <button type="button" class="primary-button" data-result="replay">${trh('result_replay')}</button>
          <button type="button" class="soft-button" data-result="share">${trh('share_result')}</button>
          <button type="button" class="ghost-button" data-result="menu">${trh('result_menu')}</button>
        </div>
        <p class="result-share-status" id="vglShareStatus" aria-live="polite"></p>
      </div>`;
    screen.appendChild(layer);
    requestAnimationFrame(() => layer.querySelector('button')?.focus());
    const scoreEl = layer.querySelector('[data-result-score]');
    if (scoreEl && typeof score === 'number') {
      scoreEl.dataset.vglRollingValue = '0';
      RollingNumber.set(scoreEl, score, (value) => formatNumber(Math.round(value)), 620);
    }
    layer.addEventListener('click', async (event) => {
      const action = event.target.closest('[data-result]')?.dataset.result;
      if (action === 'replay') { Sfx.play('click'); replay(); }
      if (action === 'menu') { Sfx.play('click'); showMenu(); }
      if (action === 'share') {
        Sfx.play('click');
        const ok = await copyResultText(shareText);
        const status = layer.querySelector('#vglShareStatus');
        if (status) status.textContent = t(ok ? 'share_copied' : 'share_failed');
      }
    });
  }

    currentRunSeed = null;
    Sfx.setScene('menu');

    refreshTopbarControls();

      { game: 'notifications', glow: 'rgba(255,107,131,.7)', icon: '▣', title: 'g_notifications_t',
        desc: 'card_notifications_d', chips: ['chip_swipe', 'chip_adaptive', 'chip_combo'], bestKey: 'notif_score', unit: 'unit_points' },
      { game: 'echo', glow: 'rgba(81,230,255,.75)', icon: '◌', title: 'g_echo_t',
        desc: 'card_echo_d', chips: ['chip_stages', 'chip_hidpi', 'chip_time_puzzle'], bestKey: 'echo_total_loops', fallbackKey: 'echo_loops', unit: 'unit_loops' },

          <div class="best-line ${best === null ? 'none' : ''}">${bestStr}</div>
          <button type="button" class="primary-button launch" data-game="${card.game}">${trh('play')}</button>
        </article>`;

    screen.innerHTML = `
      <section class="menu">
        ${MetaProfile.renderBar()}

            <h2 style="margin-top:12px">${trh('menu_q')}</h2>
            <p>${trh('menu_desc')}</p>
          </div>
          <div class="menu-badge">${trh('menu_badge')}</div>
        </div>
        <div class="relay-launch">
          <div class="relay-launch-icon">⛓</div>
          <div class="relay-launch-copy"><strong>${trh('relay_title')}</strong><span>${trh('relay_desc')}</span><br><span>${trh('relay_best', { value: formatNumber(getDifficultyBest('relay_best') || 0) })}</span></div>
          <button type="button" class="soft-button" data-relay-start="1">${trh('relay_start')}</button>
        </div>
        <div class="game-grid">${cardHtml}</div>
        <p class="footer-note">${trh('menu_footer')}</p>

  function openGame(name) {
    cleanupCurrent();
    currentAbort = new AbortController();
    currentGame = name;
    currentRunSeed = DailyChallenge.enabled ? DailyChallenge.seed() : (Rng.seedNow(), null);
    const info = gameInfo[name];
    setHeader(t(info.title), t(info.subtitle), true);
    refreshTopbarControls();
    Sfx.setScene(name);
    Sfx.resume();
    Fx.resize();
    root.classList.toggle('vgl-no-gesture', name === 'notifications');
    const module = Games[name];
    if (module && typeof module.init === 'function') module.init();
    decorateDifficulty();
    RelaySession.decorate();
    enhanceAccessibility();
    scrollRootToTop();
  }

  backButton.addEventListener('click', () => { Sfx.play('click'); showMenu(); });
  screen.addEventListener('click', (event) => {
    const badgeTrigger = event.target.closest('[data-open-badges]');
    if (badgeTrigger) { Sfx.play('click'); showBadgeShowcase(); return; }
    if (event.target.closest('[data-relay-start]')) { Sfx.play('stage'); RelaySession.start(); return; }
    const game = event.target.closest('[data-game]')?.dataset.game;
    if (game) { Sfx.play('pop'); openGame(game); }
  });

  /* ============================================================
     1. Notification Hell V3.3
     - 화면 밖으로 던져 삭제
     - 실력에 반응하는 생성 주기 / 폭탄 퓨즈
     - 5콤보마다 시간 보너스
  ============================================================ */
  function renderNotifications() {
    const rules = Difficulty.forGame('notifications');
    const GOAL = RelaySession.active ? RelaySession.shortTarget(rules.goal) : rules.goal;
    const MAX_MISTAKES = rules.maxMistakes;
    screen.innerHTML = `
      <section class="game-page">
        <div class="combo-badge" id="vglCombo">${trh('combo_initial')}</div>
        <div class="game-heading">
          <div>
            <h2>${trh('g_notifications_t')}</h2>
            <p>${escapeHtml(tr('notif_desc_dynamic', { goal: GOAL }))}</p>
          </div>
          <div class="game-actions">
            <button class="soft-button vgl-help-button" type="button" id="vglHelpButton">${trh('help_button')}</button>
            <button class="ghost-button" type="button" id="vglNotifReset">${trh('restart')}</button>
          </div>
        </div>
        <div class="hud hud-five">
          <div class="hud-item"><div class="hud-label">${trh('hud_score')}</div><div class="hud-value" id="vglScore">0</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_cleaned')}</div><div class="hud-value" id="vglJunk">0 / ${GOAL}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_mistakes')}</div><div class="hud-value" id="vglMistake">0 / ${MAX_MISTAKES}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_time_left')}</div><div class="hud-value" id="vglTime">${trh('seconds_value', { value: rules.time.toFixed(1) })}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_pressure')}</div><div class="hud-value" id="vglPressure">${trh('level_value', { value: 1 })}</div></div>
        </div>
        <div class="notice" id="vglNotifNotice">${trh('notif_notice')}</div>
        <div class="notification-desk" id="vglDesk"><div class="desk-watermark">${trh('inbox')}</div></div>
      </section>`;

    const desk = $('#vglDesk');
    const scoreEl = $('#vglScore');
    const junkEl = $('#vglJunk');
    const mistakeEl = $('#vglMistake');
    const timeEl = $('#vglTime');
    const pressureEl = $('#vglPressure');
    const noticeEl = $('#vglNotifNotice');
    const comboEl = $('#vglCombo');
    const resetButton = $('#vglNotifReset');

    const templates = [
      { app: 'n1_app', title: 'n1_title', copy: 'n1_copy', type: 'junk', tag: 'tag_ad', runaway: true },
      { app: 'n2_app', title: 'n2_title', copy: 'n2_copy', type: 'junk', tag: 'tag_fake_warning' },
      { app: 'n3_app', title: 'n3_title', copy: 'n3_copy', type: 'junk', tag: 'tag_unneeded' },
      { app: 'n4_app', title: 'n4_title', copy: 'n4_copy', type: 'junk', tag: 'tag_spam' },
      { app: 'n5_app', title: 'n5_title', copy: 'n5_copy', type: 'junk', tag: 'tag_false_positive' },
      { app: 'n6_app', title: 'n6_title', copy: 'n6_copy', type: 'junk', tag: 'tag_error' },
      { app: 'n7_app', title: 'n7_title', copy: 'n7_copy', type: 'junk', tag: 'tag_phishing', runaway: true },
      { app: 'n8_app', title: 'n8_title', copy: 'n8_copy', type: 'junk', tag: 'tag_ad' },
      { app: 'n9_app', title: 'n9_title', copy: 'n9_copy', type: 'junk', tag: 'tag_generated' },
      { app: 'n10_app', title: 'n10_title', copy: 'n10_copy', type: 'important', tag: 'tag_important' },
      { app: 'n11_app', title: 'n11_title', copy: 'n11_copy', type: 'important', tag: 'tag_important' },
      { app: 'n12_app', title: 'n12_title', copy: 'n12_copy', type: 'important', tag: 'tag_important' }
    ];

    const state = {
      active: true, cleaned: 0, mistakes: 0, score: 0, combo: 0, maxCombo: 0,
      remaining: rules.time, level: 1, z: 10, spawnCount: 0, paused: false,
      spawnTimer: 0, spawnDueAt: 0, spawnRemaining: 0, waveStarted: false, clockTimer: 0, comboTimer: 0, initialTimer: 0,
      lastTick: performance.now(), drag: null, lastWarnSec: 99
    };

    function updateHUD() {
      RollingNumber.set(scoreEl, state.score, (value) => formatNumber(Math.round(value)), 180);
      junkEl.textContent = `${state.cleaned} / ${GOAL}`;
      mistakeEl.textContent = `${state.mistakes} / ${MAX_MISTAKES}`;
      timeEl.textContent = tr('seconds_value', { value: Math.max(0, state.remaining).toFixed(1) });
      state.level = Math.min(rules.maxPressure, 1 + Math.floor(state.cleaned / Math.max(1, Math.ceil(GOAL / rules.maxPressure))));
      pressureEl.textContent = tr('level_value', { value: state.level });
      pressureEl.classList.toggle('pressure-hot', state.level >= 3);
      timeEl.style.color = state.remaining <= 10 ? 'var(--vgl-red)' : '';
    }

    function showCombo() {
      if (state.combo < 2) return;
      const mult = 1 + Math.floor(state.combo / 3);
      comboEl.textContent = tr('combo_value', { combo: state.combo, mult });
      comboEl.classList.add('show', 'pop');
      setTimeout(() => comboEl.classList.remove('pop'), 260);
    }

    function resetCombo() {
      state.combo = 0;
      comboEl.classList.remove('show');
    }

    function finish(win, title, text) {
      if (!state.active) return;
      state.active = false;
      clearTimeout(state.spawnTimer);
      clearTimeout(state.initialTimer);
      clearInterval(state.clockTimer);
      clearTimeout(state.comboTimer);
      /* V3.6 — 무실수(중요 알림 보존 완벽) 클리어 시 보너스 점수 + 퍼펙트 연출 */
      const flawless = win && state.mistakes === 0;
      if (flawless) { state.score += 500; text = `${text} ${t('notif_flawless')}`; }
      const bestInfo = win && !RelaySession.active ? submitDifficultyBest('notif_score', state.score, false) : null;
      const resultStats = {
        maxCombo: state.maxCombo, cleaned: state.cleaned, goal: GOAL,
        mistakes: state.mistakes, maxMistakes: MAX_MISTAKES, level: state.level, flawless
      };
      MetaProfile.record({ game: 'notifications', win, score: state.score, stats: resultStats });
      showResult({ win, title, text, score: state.score, bestInfo, game: 'notifications', stats: resultStats, replay: () => openGame('notifications') });
      if (flawless) setTimeout(() => Sfx.play('perfect'), 640);
    }

    function randomPosition(cardWidth, cardHeight) {
      cardWidth = cardWidth || 290;
      cardHeight = cardHeight || 125;
      const maxX = Math.max(4, desk.clientWidth - Math.min(cardWidth, desk.clientWidth - 10) - 4);
      const maxY = Math.max(4, desk.clientHeight - cardHeight - 4);
      return { x: 4 + Rng.rand() * maxX, y: 4 + Rng.rand() * maxY };
    }

    function explodeBomb(card) {
      if (!state.active || state.paused || !card.isConnected || card.dataset.handled === '1') return;
      card.dataset.handled = '1';
      const rect = card.getBoundingClientRect();
      card.remove();
      state.score = Math.max(0, state.score - 120);
      state.remaining -= 1.2;
      resetCombo();
      Sfx.play('error');
      haptic(55);
      shakeScreen(true);
      Fx.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, '#ff6b83', 28, 'cross');
      noticeEl.textContent = t('notif_bomb_exploded');
      for (let i = 0; i < 2; i++) {
        if (desk.querySelectorAll('.notification-card').length < rules.cardCap) spawnNotification('junk');
      }
      updateHUD();
    }

    function spawnNotification(forceType, makeBomb) {
      if (!state.active || state.paused) return;
      const pool = forceType ? templates.filter((t) => t.type === forceType) : templates;
      const data = pool[Math.floor(Rng.rand() * pool.length)];
      const card = document.createElement('article');
      const isBomb = Boolean(makeBomb && data.type === 'junk');
      const warning = !isBomb && data.type === 'junk' && Rng.rand() < 0.22;
      card.className = `notification-card ${data.type === 'important' ? 'important' : isBomb ? 'bomb' : warning ? 'warning' : ''}`;
      card.dataset.type = data.type;
      if (isBomb) card.dataset.bomb = '1';
      card.style.zIndex = ++state.z;
      const pos = randomPosition();
      card.style.left = `${pos.x}px`;
      card.style.top = `${pos.y}px`;
      const fuseMs = Math.max(1800, (4300 - state.level * 220 - (state.cleaned / GOAL) * 900) * rules.fuseScale);
      const kindKey = data.type === 'important' ? 'note_kind_important' : isBomb ? 'note_kind_bomb' : warning ? 'note_kind_warning' : 'note_kind_junk';
      const kindLabel = t(kindKey);
      card.setAttribute('role', 'group');
      card.setAttribute('aria-label', tr('a11y_note_card', { kind: kindLabel, app: t(data.app), title: t(data.title) }));
      card.innerHTML = `
        <div class="note-head">
          <span class="note-dot" aria-hidden="true"></span>
          <span class="note-kind">${trh(kindKey)}</span>
          <span class="note-app">${trh(data.app)}</span>
          <span class="note-swipe" aria-hidden="true">↔ ${trh('note_swipe')}</span>
          <button class="note-close" type="button" aria-label="${escapeHtml(tr('a11y_close_note', { kind: kindLabel, title: t(data.title) }))}" ${data.runaway && !isBomb ? 'data-runaway="1"' : ''}>×</button>
        </div>
        <div class="note-body">
          <div class="note-title">${isBomb ? '✹ ' + trh(data.title) : data.type === 'important' ? '◆ ' + trh(data.title) : trh(data.title)}</div>
          <div class="note-copy">${isBomb ? trh('bomb_copy', { seconds: (fuseMs / 1000).toFixed(1) }) : trh(data.copy)}</div>
          <span class="note-tag">${isBomb ? trh('tag_bomb') : trh(data.tag)}</span>
        </div>
        ${isBomb ? '<div class="note-fuse"><span></span></div>' : ''}`;
      desk.appendChild(card);
      Sfx.play('alarm');

      if (isBomb) {
        const fuse = card.querySelector('.note-fuse > span');
        let remainingFuse = fuseMs;
        let lastFuseTick = performance.now();
        const tick = () => {
          if (!state.active || !card.isConnected || card.dataset.handled === '1') return;
          const now = performance.now();
          if (!state.paused) remainingFuse -= Math.max(0, now - lastFuseTick);
          lastFuseTick = now;
          const left = Math.max(0, remainingFuse / fuseMs);
          if (fuse) fuse.style.transform = `scaleX(${left})`;
          if (left <= 0) { explodeBomb(card); return; }
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

      const close = card.querySelector('.note-close');
      let escapes = data.runaway && !isBomb ? 2 : 0;
      if (escapes) {
        listen(close, 'pointerenter', () => {
          if (!state.active || escapes <= 0) return;
          escapes -= 1;
          Sfx.play('step');
          close.style.transform = `translate(${Rng.rand() * -95 - 15}px, ${Rng.rand() * 28 - 14}px)`;
        });
      }
    }

    function animateDismiss(card, mode, direction) {
      card.classList.remove('dragging');
      if (Motion.reduced()) { card.remove(); return; }
      card.classList.add('flinging');
      const current = card.style.transform || 'translateX(0)';
      const target = mode === 'fling'
        ? `translateX(${direction * (desk.clientWidth + card.offsetWidth)}px) rotate(${direction * 24}deg)`
        : 'scale(.78) rotate(3deg)';
      if (typeof card.animate === 'function') {
        card.animate(
          [{ opacity: 1, transform: current }, { opacity: 0, transform: target }],
          { duration: mode === 'fling' ? 260 : 180, easing: 'cubic-bezier(.2,.8,.2,1)', fill: 'forwards' }
        );
      } else {
        card.style.opacity = '0';
        card.style.transform = target;
      }
      setTimeout(() => card.remove(), mode === 'fling' ? 250 : 175);
    }

    function dismissCard(card, ev, mode, direction) {
      if (!state.active || !card || card.dataset.handled === '1') return;
      card.dataset.handled = '1';
      const cx = ev?.clientX || card.getBoundingClientRect().left + card.offsetWidth / 2;
      const cy = ev?.clientY || card.getBoundingClientRect().top + card.offsetHeight / 2;
      direction = direction || 1;

      if (card.dataset.type === 'important') {
        state.mistakes += 1;
        resetCombo();
        Sfx.play('fail');
        haptic(60);
        shakeScreen(true);
        animateDismiss(card, mode, direction);
        noticeEl.textContent = mode === 'fling'
          ? t('notif_important_fling')
          : t('notif_important_close');
        if (state.mistakes >= MAX_MISTAKES) {
          updateHUD();
          finish(false, t('notif_fail_title'), tr('notif_fail_text', { mistakes: MAX_MISTAKES }));
          return;
        }
        setTimeout(() => spawnNotification('important'), 360);
      } else {
        state.cleaned += 1;
        state.combo += 1;
        state.maxCombo = Math.max(state.maxCombo, state.combo);
        const mult = 1 + Math.floor(state.combo / 3);
        const gained = 100 * mult + (card.dataset.bomb ? 150 : 0) + (mode === 'fling' ? 75 : 0);
        state.score += gained;
        Sfx.play(mode === 'fling' ? 'fling' : (state.combo >= 2 ? 'combo' : 'click'), state.combo);
        if (state.combo >= 2) haptic(15);
        Fx.burst(cx, cy, card.dataset.bomb ? '#ff6b83' : (state.combo >= 4 ? '#ffd166' : '#51e6ff'), card.dataset.bomb ? 22 : 12, card.dataset.bomb ? 'cross' : 'circle');
        bump(scoreEl);
        showCombo();
        clearTimeout(state.comboTimer);
        state.comboTimer = setTimeout(resetCombo, rules.comboWindow);
        animateDismiss(card, mode, direction);

        if (state.combo % 5 === 0) {
          state.remaining = Math.min(rules.time + 6, state.remaining + rules.bonusTime);
          state.score += 200;
          noticeEl.textContent = tr('notif_bonus', { combo: state.combo });
          Sfx.play('milestone', state.combo);
          Fx.burst(cx, cy, '#ffd166', 20, 'circle');
        } else {
          noticeEl.textContent = mode === 'fling'
            ? tr('notif_fling_ok', { combo: state.combo })
            : tr('notif_clean_ok', { combo: state.combo });
        }

        if (state.cleaned >= GOAL) {
          updateHUD();
          finish(true, t('notif_win_title'), tr('notif_win_text', { level: state.level, goal: GOAL }));
          return;
        }
      }
      updateHUD();
    }

    function scheduleSpawn(resumeDelay) {
      clearTimeout(state.spawnTimer);
      state.spawnTimer = 0;
      if (!state.active || state.paused || !state.waveStarted) return;
      const progress = state.cleaned / GOAL;
      const base = 1400 - progress * 520 - (state.level - 1) * 90;
      const delay = Number.isFinite(resumeDelay)
        ? Math.max(0, resumeDelay)
        : Math.max(480, base * rules.spawnScale) * (0.86 + Rng.rand() * 0.28);
      state.spawnRemaining = delay;
      state.spawnDueAt = performance.now() + delay;
      state.spawnTimer = setTimeout(() => {
        state.spawnTimer = 0;
        state.spawnRemaining = 0;
        if (!state.active || state.paused) return;
        if (desk.querySelectorAll('.notification-card').length < rules.cardCap) {
          state.spawnCount += 1;
          const bombEvery = Math.max(rules.minBombEvery, rules.bombBase - state.level);
          const bomb = state.spawnCount % bombEvery === 0;
          const importantRoll = Rng.rand();
          const importantCount = desk.querySelectorAll('.notification-card.important').length;
          const important = !bomb && importantCount < rules.importantCap
            && importantRoll < rules.importantBase + state.level * 0.015;
          spawnNotification(important ? 'important' : 'junk', bomb);
        }
        scheduleSpawn();
      }, delay);
    }

    function onPointerDown(event) {
      if (!state.active || state.paused || event.target.closest('.note-close')) return;
      const head = event.target.closest('.note-head');
      const card = head?.closest('.notification-card');
      if (!card || card.dataset.handled === '1') return;
      event.preventDefault();
      const rect = card.getBoundingClientRect();
      const deskRect = desk.getBoundingClientRect();
      state.drag = {
        card, pointerId: event.pointerId,
        offsetX: event.clientX - rect.left, offsetY: event.clientY - rect.top,
        deskRect, startX: event.clientX, startY: event.clientY,
        lastX: event.clientX, lastAt: performance.now(), vx: 0, moved: false
      };
      card.style.zIndex = ++state.z;
      card.classList.add('dragging');
      head.setPointerCapture?.(event.pointerId);
    }

    function onPointerMove(event) {
      const drag = state.drag;
      if (!drag || !state.active || state.paused || drag.pointerId !== event.pointerId) return;
      event.preventDefault();
      const now = performance.now();
      const dt = Math.max(1, now - drag.lastAt);
      drag.vx = (event.clientX - drag.lastX) / dt;
      drag.lastX = event.clientX;
      drag.lastAt = now;
      const dx = event.clientX - drag.startX;
      const dy = event.clientY - drag.startY;
      drag.moved = drag.moved || Math.hypot(dx, dy) > 8;
      const maxX = desk.clientWidth - drag.card.offsetWidth;
      const maxY = desk.clientHeight - drag.card.offsetHeight;
      const x = Math.max(-90, Math.min(maxX + 90, event.clientX - drag.deskRect.left - drag.offsetX));
      const y = Math.max(0, Math.min(maxY, event.clientY - drag.deskRect.top - drag.offsetY));
      drag.card.style.left = `${x}px`;
      drag.card.style.top = `${y}px`;
      drag.card.style.transform = `rotate(${Math.max(-11, Math.min(11, dx * 0.035))}deg)`;
      drag.card.style.opacity = String(1 - Math.min(0.3, Math.abs(dx) / 650));
    }

    function onPointerUp(event) {
      const drag = state.drag;
      if (!drag || drag.pointerId !== event.pointerId) return;
      state.drag = null;
      const dx = event.clientX - drag.startX;
      const fling = Math.abs(dx) > 90 && (Math.abs(drag.vx) > 0.34 || Math.abs(dx) > 170);
      drag.card.classList.remove('dragging');
      if (fling) {
        dismissCard(drag.card, event, 'fling', Math.sign(dx) || 1);
      } else {
        drag.card.style.transform = '';
        drag.card.style.opacity = '';
      }
    }

    function onPointerCancel(event) {
      const drag = state.drag;
      if (!drag || drag.pointerId !== event.pointerId) return;
      state.drag = null;
      drag.card.classList.remove('dragging');
      drag.card.style.transform = '';
      drag.card.style.opacity = '';
    }

    listen(desk, 'click', (event) => {
      const close = event.target.closest('.note-close');
      if (close) dismissCard(close.closest('.notification-card'), event, 'click', 1);
    });
    listen(desk, 'pointerdown', onPointerDown);
    listen(window, 'pointermove', onPointerMove, { passive: false });
    listen(window, 'pointerup', onPointerUp, { passive: false });
    listen(window, 'pointercancel', onPointerCancel, { passive: false });
    listen(resetButton, 'click', () => { Sfx.play('click'); openGame('notifications'); });

    const startWave = () => {
      if (!state.active) return;
      if (state.paused) { state.initialTimer = setTimeout(startWave, 100); return; }
      Sfx.play('go');
      spawnNotification('important');
      spawnNotification('junk');
      spawnNotification('junk');
      spawnNotification('important');
      spawnNotification('junk');
      spawnNotification('junk');
      state.waveStarted = true;
      scheduleSpawn();
    };

    HelpSystem.attach({
      game: 'notifications',
      onPause() {
        state.paused = true;
        if (state.spawnTimer) state.spawnRemaining = Math.max(0, state.spawnDueAt - performance.now());
        clearTimeout(state.spawnTimer);
        state.spawnTimer = 0;
        state.lastTick = performance.now();
      },
      onResume() {
        if (!state.active) return;
        state.paused = false;
        state.lastTick = performance.now();
        if (state.waveStarted) scheduleSpawn(state.spawnRemaining);
      }
    });

    state.initialTimer = setTimeout(startWave, 40);

    state.clockTimer = setInterval(() => {
      const now = performance.now();
      if (state.paused) { state.lastTick = now; return; }
      state.remaining -= (now - state.lastTick) / 1000;
      state.lastTick = now;
      /* V3.6 — 잔여 5초 이하에서 매 초 카운트다운 경고(청각+촉각) */
      const warnSec = Math.ceil(state.remaining);
      if (state.remaining > 0 && state.remaining <= 5 && warnSec !== state.lastWarnSec) {
        state.lastWarnSec = warnSec;
        Sfx.play('danger');
        haptic(22);
      }
      updateHUD();
      if (state.remaining <= 0) finish(false, t('notif_timeout_title'), tr('notif_timeout_text', { cleaned: state.cleaned }));
    }, 100);

    updateHUD();
    enhanceAccessibility();
    addCleanup(() => {
      state.active = false;
      clearTimeout(state.spawnTimer);
      clearTimeout(state.initialTimer);
      clearInterval(state.clockTimer);
      clearTimeout(state.comboTimer);
    });
  }

  /* ============================================================
     2. Echo Co-op V3.3
     - 3개 스테이지 데이터
     - 루프별 에코 색상
     - devicePixelRatio 대응 HiDPI Canvas
  ============================================================ */
  function renderEcho() {
    const rules = Difficulty.forGame('echo');
    const relayStageTotal = RelaySession.active ? RelaySession.BALANCE.echoStages : 3;
    screen.innerHTML = `

        </div>

          <div class="key-help">${trh('echo_key_help')} <span class="echo-undo-hint">${trh('echo_undo_hint')}</span></div>
          <div class="dpad" aria-label="${trh('echo_touch_controls')}">
            <button type="button" data-key="ArrowUp">↑</button>
