        state.comboTimer = setTimeout(resetCombo, rules.comboWindow);
        animateDismiss(card, mode, direction);

        if (state.combo % 5 === 0) {
          state.remaining = Math.min(rules.time + 6, state.remaining + rules.bonusTime);
          state.score += 200;
          noticeEl.textContent = tr('notif_bonus', { combo: state.combo });
          Sfx.play('milestone', state.combo);
          Fx.burst(cx, cy, '#ffd166', 20, 'circle');
        } else {
          noticeEl.textContent = mode === 'fling'
            ? tr('notif_fling_ok', { combo: state.combo })
            : tr('notif_clean_ok', { combo: state.combo });
        }

        if (state.cleaned >= GOAL) {
          updateHUD();
          finish(true, t('notif_win_title'), tr('notif_win_text', { level: state.level, goal: GOAL }));
          return;
        }
      }
      updateHUD();
    }

    function scheduleSpawn(resumeDelay) {
      clearTimeout(state.spawnTimer);
      state.spawnTimer = 0;
      if (!state.active || state.paused || !state.waveStarted) return;
      const progress = state.cleaned / GOAL;
      const base = 1400 - progress * 520 - (state.level - 1) * 90;
      const delay = Number.isFinite(resumeDelay)
        ? Math.max(0, resumeDelay)
        : Math.max(480, base * rules.spawnScale) * (0.86 + Rng.rand() * 0.28);
      state.spawnRemaining = delay;
      state.spawnDueAt = performance.now() + delay;
      state.spawnTimer = setTimeout(() => {
        state.spawnTimer = 0;
        state.spawnRemaining = 0;
        if (!state.active || state.paused) return;
        if (desk.querySelectorAll('.notification-card').length < rules.cardCap) {
          state.spawnCount += 1;
          const bombEvery = Math.max(rules.minBombEvery, rules.bombBase - state.level);
          const bomb = state.spawnCount % bombEvery === 0;
          const importantRoll = Rng.rand();
          const importantCount = desk.querySelectorAll('.notification-card.important').length;
          const important = !bomb && importantCount < rules.importantCap
            && importantRoll < rules.importantBase + state.level * 0.015;
          spawnNotification(important ? 'important' : 'junk', bomb);
        }
        scheduleSpawn();
      }, delay);
    }

    function onPointerDown(event) {
      if (!state.active || state.paused || event.target.closest('.note-close')) return;
      const head = event.target.closest('.note-head');
      const card = head?.closest('.notification-card');
      if (!card || card.dataset.handled === '1') return;
      event.preventDefault();
      const rect = card.getBoundingClientRect();
      const deskRect = desk.getBoundingClientRect();
      state.drag = {
        card, pointerId: event.pointerId,
        offsetX: event.clientX - rect.left, offsetY: event.clientY - rect.top,
        deskRect, startX: event.clientX, startY: event.clientY,
        lastX: event.clientX, lastAt: performance.now(), vx: 0, moved: false
      };
      card.style.zIndex = ++state.z;
      card.classList.add('dragging');
      head.setPointerCapture?.(event.pointerId);
    }

    function onPointerMove(event) {
      const drag = state.drag;
      if (!drag || !state.active || state.paused || drag.pointerId !== event.pointerId) return;
      event.preventDefault();
      const now = performance.now();
      const dt = Math.max(1, now - drag.lastAt);
      drag.vx = (event.clientX - drag.lastX) / dt;
      drag.lastX = event.clientX;
      drag.lastAt = now;
      const dx = event.clientX - drag.startX;
      const dy = event.clientY - drag.startY;
      drag.moved = drag.moved || Math.hypot(dx, dy) > 8;
      const maxX = desk.clientWidth - drag.card.offsetWidth;
      const maxY = desk.clientHeight - drag.card.offsetHeight;
      const x = Math.max(-90, Math.min(maxX + 90, event.clientX - drag.deskRect.left - drag.offsetX));
      const y = Math.max(0, Math.min(maxY, event.clientY - drag.deskRect.top - drag.offsetY));
      drag.card.style.left = `${x}px`;
      drag.card.style.top = `${y}px`;
      drag.card.style.transform = `rotate(${Math.max(-11, Math.min(11, dx * 0.035))}deg)`;
      drag.card.style.opacity = String(1 - Math.min(0.3, Math.abs(dx) / 650));
    }

    function onPointerUp(event) {
      const drag = state.drag;
      if (!drag || drag.pointerId !== event.pointerId) return;
      state.drag = null;
      const dx = event.clientX - drag.startX;
      const fling = Math.abs(dx) > 90 && (Math.abs(drag.vx) > 0.34 || Math.abs(dx) > 170);
      drag.card.classList.remove('dragging');
      if (fling) {
        dismissCard(drag.card, event, 'fling', Math.sign(dx) || 1);
      } else {
        drag.card.style.transform = '';
        drag.card.style.opacity = '';
      }
    }

    function onPointerCancel(event) {
      const drag = state.drag;
      if (!drag || drag.pointerId !== event.pointerId) return;
      state.drag = null;
      drag.card.classList.remove('dragging');
      drag.card.style.transform = '';
      drag.card.style.opacity = '';
    }

    listen(desk, 'click', (event) => {
      const close = event.target.closest('.note-close');
      if (close) dismissCard(close.closest('.notification-card'), event, 'click', 1);
    });
    listen(desk, 'pointerdown', onPointerDown);
    listen(window, 'pointermove', onPointerMove, { passive: false });
    listen(window, 'pointerup', onPointerUp, { passive: false });
    listen(window, 'pointercancel', onPointerCancel, { passive: false });
    listen(resetButton, 'click', () => { Sfx.play('click'); openGame('notifications'); });

    const startWave = () => {
      if (!state.active) return;
      if (state.paused) { state.initialTimer = setTimeout(startWave, 100); return; }
      Sfx.play('go');
      spawnNotification('important');
      spawnNotification('junk');
      spawnNotification('junk');
      spawnNotification('important');
      spawnNotification('junk');
      spawnNotification('junk');
      state.waveStarted = true;
      scheduleSpawn();
    };

    HelpSystem.attach({
      game: 'notifications',
      onPause() {
        state.paused = true;
        if (state.spawnTimer) state.spawnRemaining = Math.max(0, state.spawnDueAt - performance.now());
        clearTimeout(state.spawnTimer);
        state.spawnTimer = 0;
        state.lastTick = performance.now();
      },
      onResume() {
        if (!state.active) return;
        state.paused = false;
        state.lastTick = performance.now();
        if (state.waveStarted) scheduleSpawn(state.spawnRemaining);
      }
    });

    state.initialTimer = setTimeout(startWave, 40);

    state.clockTimer = setInterval(() => {
      const now = performance.now();
      if (state.paused) { state.lastTick = now; return; }
      state.remaining -= (now - state.lastTick) / 1000;
      state.lastTick = now;
      /* V3.7 — 잔여 5초 이하에서 매 초 카운트다운 경고(청각+촉각) */
      const warnSec = Math.ceil(state.remaining);
      if (state.remaining > 0 && state.remaining <= 5 && warnSec !== state.lastWarnSec) {
        state.lastWarnSec = warnSec;
        Sfx.play('danger');
        haptic(22);
      }
      updateHUD();
      if (state.remaining <= 0) finish(false, t('notif_timeout_title'), tr('notif_timeout_text', { cleaned: state.cleaned }));
    }, 100);

    updateHUD();
    enhanceAccessibility();
    addCleanup(() => {
      state.active = false;
      clearTimeout(state.spawnTimer);
      clearTimeout(state.initialTimer);
      clearInterval(state.clockTimer);
      clearTimeout(state.comboTimer);
    });
  }

  /* ============================================================
     2. Echo Co-op V3.3
     - 3개 스테이지 데이터
     - 루프별 에코 색상
     - devicePixelRatio 대응 HiDPI Canvas
  ============================================================ */
  function renderEcho() {
    const rules = Difficulty.forGame('echo');
    const relayStageTotal = RelaySession.active ? RelaySession.BALANCE.echoStages : 3;
    screen.innerHTML = `
      <section class="game-page">
        <div class="game-heading">
          <div>
            <h2>${trh('g_echo_t')}</h2>
            <p>${trh('echo_desc')}</p>
          </div>
          <div class="game-actions">
            <button class="soft-button vgl-help-button" type="button" id="vglHelpButton">${trh('help_button')}</button>
            <button class="soft-button" type="button" id="vglEchoUndo">${trh('echo_undo')}</button>
            <button class="soft-button" type="button" id="vglEndLoop">${trh('echo_save_loop')}</button>
            <button class="ghost-button" type="button" id="vglEchoReset">${trh('echo_restart_stage')}</button>
          </div>
        </div>
        <div class="hud hud-five">
          <div class="hud-item"><div class="hud-label">${trh('hud_stage')}</div><div class="hud-value" id="vglStageNum">1 / ${relayStageTotal}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_current_loop')}</div><div class="hud-value" id="vglLoopNum">1</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_time_left')}</div><div class="hud-value" id="vglLoopTime">${trh('seconds_value', { value: (9.5 * rules.timeScale).toFixed(1) })}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_echoes')}</div><div class="hud-value" id="vglEchoCount">0</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_door')}</div><div class="hud-value" id="vglDoor">${trh('echo_locked')}</div></div>
        </div>
        <div class="notice" id="vglEchoNotice">${trh('echo_initial_notice')}</div>
        <div class="canvas-wrap" id="vglEchoWrap">
          <div class="echo-stage-ribbon" id="vglStageRibbon">${trh('echo_stage_ribbon', { stage: 1, name: t('echo_stage1_name') })}</div>
          <canvas id="vglEchoCanvas" width="720" height="440"></canvas>
        </div>
        <div class="echo-controls">
          <div class="key-help">${trh('echo_key_help')} <span class="echo-undo-hint">${trh('echo_undo_hint')}</span></div>
          <div class="dpad" aria-label="${trh('echo_touch_controls')}">
            <button type="button" data-key="ArrowUp">↑</button>
            <button type="button" data-key="ArrowLeft">←</button>
            <button type="button" data-key="ArrowDown">↓</button>
            <button type="button" data-key="ArrowRight">→</button>
          </div>
        </div>
      </section>`;

    const canvas = $('#vglEchoCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = $('#vglEchoWrap');
    const stageRibbon = $('#vglStageRibbon');
    const stageNumber = $('#vglStageNum');
    const loopNumber = $('#vglLoopNum');
    const loopTime = $('#vglLoopTime');
    const echoCount = $('#vglEchoCount');
    const doorState = $('#vglDoor');
    const echoNotice = $('#vglEchoNotice');
    const undoButton = $('#vglEchoUndo');
    const endLoopButton = $('#vglEndLoop');
    const resetButton = $('#vglEchoReset');

    const W = 720;
    const H = 440;
    const sampleEvery = 0.05;
    const echoColors = ['#7de7ff', '#a57cff', '#ff8fc7', '#ffd166', '#77f2a1', '#ff9f68'];
    const STAGES = [
      {
        nameKey: 'echo_stage1_name', duration: 9.5, speed: 168, tint: 'rgba(81,230,255,.055)',
        start: { x: 72, y: 220 },
        plates: [
          { x: 255, y: 125, r: 27, label: 'A' },
          { x: 255, y: 315, r: 27, label: 'B' }
        ],
        gates: [{ x: 492, y: 0, w: 18, h: 440 }],
        exit: { x: 650, y: 220, r: 31 }, walls: [],
        hintKey: 'echo_stage1_hint'
      },
      {
        nameKey: 'echo_stage2_name', duration: 11, speed: 170, tint: 'rgba(165,124,255,.06)',
        start: { x: 70, y: 360 },
        plates: [
          { x: 195, y: 85, r: 25, label: 'A' },
          { x: 235, y: 355, r: 25, label: 'B' },
          { x: 430, y: 225, r: 25, label: 'C' }
        ],
        gates: [{ x: 530, y: 0, w: 18, h: 440 }],
        exit: { x: 650, y: 82, r: 30 },
        walls: [
          { x: 112, y: 176, w: 218, h: 18 },
          { x: 328, y: 55, w: 18, h: 265 }
        ],
        hintKey: 'echo_stage2_hint'
      },
      {
        nameKey: 'echo_stage3_name', duration: 12, speed: 172, tint: 'rgba(255,209,102,.05)',
        start: { x: 65, y: 220 },
        plates: [
          { x: 210, y: 82, r: 25, label: 'A' },
          { x: 210, y: 358, r: 25, label: 'B' },
          { x: 425, y: 220, r: 25, label: 'C' }
        ],
        gates: [{ x: 535, y: 0, w: 18, h: 440 }],
        exit: { x: 660, y: 220, r: 29 },
        walls: [
          { x: 145, y: 0, w: 18, h: 160 },
          { x: 145, y: 280, w: 18, h: 160 },
          { x: 250, y: 140, w: 190, h: 18 },
          { x: 250, y: 282, w: 190, h: 18 }
        ],
        hintKey: 'echo_stage3_hint'
      }
    ];

    const ACTIVE_STAGES = RelaySession.active ? STAGES.slice(0, RelaySession.BALANCE.echoStages) : STAGES;
    let stage = ACTIVE_STAGES[0];
    const keys = new Set();
    const state = {
      active: true, transitioning: false, paused: false, helpPausedAt: 0, stageIndex: 0, stageLoop: 1,
      player: { ...stage.start, r: 12 }, echoes: [], record: [],
      loopStart: performance.now(), lastFrame: performance.now(), lastSampleAt: 0,
      unlocked: false, animationId: 0, lastBeep: -1,
      prevPlateStates: [], trail: [], totalLoops: 0, stageLoops: [], stageTimer: 0
    };

    function stageDuration() { return stage.duration * rules.timeScale; }

    function fitCanvas() {
      const rect = canvas.getBoundingClientRect();
      const cssW = Math.max(320, rect.width || W);
      const cssH = cssW * H / W;
      const dpr = Math.min(3, window.devicePixelRatio || 1);
      const pixelW = Math.max(1, Math.round(cssW * dpr));
      const pixelH = Math.max(1, Math.round(cssH * dpr));
      if (canvas.width !== pixelW || canvas.height !== pixelH) {
        canvas.width = pixelW;
        canvas.height = pixelH;
      }
      ctx.setTransform(pixelW / W, 0, 0, pixelH / H, 0, 0);
    }

    function entityAt(recording, elapsed) {
      if (!recording.length) return stage.start;
      const index = Math.min(recording.length - 1, Math.floor(elapsed / sampleEvery));
      return recording[index] || recording[recording.length - 1] || stage.start;
    }

    function plateRadius(plate) { return Math.max(15, plate.r * rules.plateScale); }

    function isOnPlate(entity, plate) {
      return Math.hypot(entity.x - plate.x, entity.y - plate.y) <= plateRadius(plate) - 2;
    }

    function circleHitsRect(x, y, radius, rect) {
      const cx = Math.max(rect.x, Math.min(x, rect.x + rect.w));
      const cy = Math.max(rect.y, Math.min(y, rect.y + rect.h));
      return Math.hypot(x - cx, y - cy) < radius + 1;
    }

    function blockers() {
      return state.unlocked ? stage.walls : stage.walls.concat(stage.gates);
    }

    function movePlayer(dx, dy, dt) {
      if (!dx && !dy) return;
      const length = Math.hypot(dx, dy) || 1;
      const amount = stage.speed * rules.speedScale * dt;
      const radius = state.player.r;
      const clampX = (x) => Math.max(radius + 8, Math.min(W - radius - 8, x));
      const clampY = (y) => Math.max(radius + 8, Math.min(H - radius - 8, y));
      const nextX = clampX(state.player.x + dx / length * amount);
      const nextY = clampY(state.player.y + dy / length * amount);
      if (!blockers().some((rect) => circleHitsRect(nextX, state.player.y, radius, rect))) state.player.x = nextX;
      if (!blockers().some((rect) => circleHitsRect(state.player.x, nextY, radius, rect))) state.player.y = nextY;
    }

    function updateHUD(elapsed) {
      stageNumber.textContent = `${state.stageIndex + 1} / ${ACTIVE_STAGES.length}`;
      loopNumber.textContent = String(state.stageLoop);
      loopTime.textContent = tr('seconds_value', { value: Math.max(0, stageDuration() - elapsed).toFixed(1) });
      echoCount.textContent = String(state.echoes.length);
      doorState.textContent = state.unlocked ? t('echo_open') : t('echo_locked');
      doorState.style.color = state.unlocked ? 'var(--vgl-lime)' : 'var(--vgl-red)';
      stageRibbon.textContent = tr('echo_stage_ribbon', { stage: state.stageIndex + 1, name: t(stage.nameKey) });
    }

    function loadStage(index) {
      clearTimeout(state.stageTimer);
      state.stageIndex = index;
      stage = ACTIVE_STAGES[index];
      const now = performance.now();
      state.player = { ...stage.start, r: 12 };
      state.echoes = [];
      state.stageLoop = 1;
      state.record = [{ x: state.player.x, y: state.player.y }];
      state.loopStart = now;
      state.lastFrame = now;
      state.lastSampleAt = 0;
      state.unlocked = false;
      state.transitioning = false;
      state.lastBeep = -1;
      state.prevPlateStates = stage.plates.map(() => false);
      state.trail = [];
      keys.clear();
      canvasWrap.classList.remove('stage-clear');
      canvasWrap.removeAttribute('data-clear-text');
      echoNotice.textContent = t(stage.hintKey);
      updateHUD(0);
      fitCanvas();
    }

    function commitLoop() {
      if (!state.active || state.transitioning || state.paused) return;
      const required = Math.ceil(stageDuration() / sampleEvery) + 1;
      if (state.record.length === 0) state.record.push({ x: state.player.x, y: state.player.y });
      while (state.record.length < required) state.record.push({ x: state.player.x, y: state.player.y });
      const trimmed = state.echoes.length >= rules.maxEchoes;
      if (trimmed) state.echoes.shift();
      state.echoes.push(state.record.slice(0, required));
      state.stageLoop += 1;
      const now = performance.now();
      state.player = { ...stage.start, r: 12 };
      state.record = [{ x: state.player.x, y: state.player.y }];
      state.loopStart = now;
      state.lastFrame = now;
      state.lastSampleAt = 0;
      state.lastBeep = -1;
      state.trail = [];
      state.prevPlateStates = stage.plates.map(() => false);
      Sfx.play('pop');
      echoNotice.textContent = trimmed
        ? tr('echo_memory_trimmed', { echoes: state.echoes.length })
        : tr('echo_loop_notice', { loop: state.stageLoop, echoes: state.echoes.length });
      updateHUD(0);
    }

    function undoLastLoop() {
      if (!state.active || state.paused || state.transitioning) return;
      if (state.unlocked) {
        echoNotice.textContent = t('echo_undo_locked');
        Sfx.play('error');
        return;
      }
      if (!state.echoes.length) {
        echoNotice.textContent = t('echo_undo_none');
        Sfx.play('error');
        return;
      }
      state.echoes.pop();
      state.stageLoop = Math.max(1, state.stageLoop - 1);
      const now = performance.now();
      state.player = { ...stage.start, r: 12 };
      state.record = [{ x: state.player.x, y: state.player.y }];
      state.loopStart = now;
      state.lastFrame = now;
      state.lastSampleAt = 0;
      state.lastBeep = -1;
      state.trail = [];
      state.prevPlateStates = stage.plates.map(() => false);
      keys.clear();
      echoNotice.textContent = tr('echo_undo_done', { loop: state.stageLoop, echoes: state.echoes.length });
      Sfx.play('reveal');
      updateHUD(0);
    }

    function finishAllStages() {
      state.active = false;
      cancelAnimationFrame(state.animationId);
      const bestInfo = !RelaySession.active ? submitDifficultyBest('echo_total_loops', state.totalLoops, true) : null;
      const perfectLimit = ACTIVE_STAGES.length * 3 - 1;
      const perfect = state.totalLoops <= perfectLimit;
      const resultStats = {
        totalLoops: state.totalLoops, stageLoops: state.stageLoops.slice(),
        maxStageLoops: Math.max(...state.stageLoops), perfect,
        stages: state.stageLoops.length, totalStages: ACTIVE_STAGES.length
      };
      MetaProfile.record({ game: 'echo', win: true, score: state.totalLoops, stats: resultStats });
      showResult({
        win: true,
        title: perfect ? t('echo_perfect_title') : t('echo_win_title'),
        text: tr('echo_result_text', { loops: state.totalLoops, bonus: perfect ? t('echo_min_suffix') : '' }),
        score: state.totalLoops,
        bestInfo,
        game: 'echo',
        stats: resultStats,
        replay: () => openGame('echo')
      });
    }

    function completeStage() {
      if (state.transitioning || !state.active) return;
      state.transitioning = true;
      const used = state.stageLoop;
      state.totalLoops += used;
      state.stageLoops.push(used);
      Sfx.play('stage');
      haptic([18, 35, 25]);
      canvasWrap.dataset.clearText = tr('echo_stage_clear', { stage: state.stageIndex + 1, loops: used });
      canvasWrap.classList.add('stage-clear');
      echoNotice.textContent = tr('echo_stage_complete', { name: t(stage.nameKey), loops: used });
      state.stageTimer = setTimeout(() => {
        if (!state.active) return;
        if (state.stageIndex >= ACTIVE_STAGES.length - 1) finishAllStages();
        else loadStage(state.stageIndex + 1);
      }, 1050);
    }

    function drawGrid() {
      ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#080c17';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = stage.tint;
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = 'rgba(255,255,255,.035)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    }

    function drawPlate(plate, on) {
      ctx.save();
      if (on) { ctx.shadowColor = '#77f2a1'; ctx.shadowBlur = 22; }
      ctx.beginPath();
      ctx.arc(plate.x, plate.y, plateRadius(plate), 0, Math.PI * 2);
      ctx.fillStyle = on ? 'rgba(119,242,161,.3)' : 'rgba(255,209,102,.09)';
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 3;
      ctx.strokeStyle = on ? '#77f2a1' : '#ffd166';
      ctx.stroke();
      ctx.fillStyle = on ? '#baffcb' : '#ffd166';
      ctx.font = '900 16px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(plate.label, plate.x, plate.y + 1);
      ctx.restore();
    }

    function drawEntity(entity, isPlayer, index) {
      const color = isPlayer ? '#51e6ff' : echoColors[index % echoColors.length];
      ctx.save();
      ctx.globalAlpha = isPlayer ? 1 : Math.max(0.34, 0.82 - index * 0.08);
      ctx.beginPath();
      ctx.arc(entity.x, entity.y, isPlayer ? 12 : 11, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = isPlayer ? 18 : 13;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = isPlayer ? '#071016' : '#181124';
      ctx.font = '900 9px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(isPlayer ? t('you_short') : `E${index + 1}`, entity.x, entity.y + 0.5);
      ctx.restore();
    }

    function drawWorld(elapsed, echoPositions, plateStates) {
      drawGrid();

      for (let i = 0; i < state.trail.length; i++) {
        const point = state.trail[i];
        ctx.globalAlpha = (i / Math.max(1, state.trail.length)) * 0.28;
        ctx.beginPath();
        ctx.arc(point.x, point.y, 9, 0, Math.PI * 2);
        ctx.fillStyle = '#51e6ff';
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = 'rgba(255,255,255,.055)';
      ctx.fillRect(stage.start.x - 52, stage.start.y - 42, 104, 84);
      ctx.strokeStyle = 'rgba(81,230,255,.35)';
      ctx.strokeRect(stage.start.x - 52, stage.start.y - 42, 104, 84);
      ctx.fillStyle = '#9ba5c1';
      ctx.font = '800 11px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(t('echo_canvas_loop_start'), stage.start.x, stage.start.y - 52);

      stage.walls.forEach((wall) => {
        ctx.fillStyle = 'rgba(80,91,124,.72)';
        ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
        ctx.strokeStyle = 'rgba(255,255,255,.12)';
        ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
      });

      stage.plates.forEach((plate, index) => drawPlate(plate, plateStates[index]));

      stage.gates.forEach((gate) => {
        if (!state.unlocked) {
          ctx.fillStyle = 'rgba(255,107,131,.72)';
          ctx.fillRect(gate.x, gate.y, gate.w, gate.h);
          ctx.fillStyle = '#ffd8df';
          ctx.font = '900 11px system-ui';
          ctx.save();
          ctx.translate(gate.x + gate.w / 2, H / 2);
          ctx.rotate(-Math.PI / 2);
          ctx.fillText(t('echo_canvas_sync_lock'), 0, 4);
          ctx.restore();
        } else {
          ctx.fillStyle = 'rgba(119,242,161,.12)';
          ctx.fillRect(gate.x, gate.y, gate.w, gate.h);
        }
      });

      ctx.beginPath();
      ctx.arc(stage.exit.x, stage.exit.y, stage.exit.r, 0, Math.PI * 2);
      ctx.fillStyle = state.unlocked ? 'rgba(119,242,161,.22)' : 'rgba(255,255,255,.035)';
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = state.unlocked ? '#77f2a1' : 'rgba(255,255,255,.18)';
      ctx.stroke();
      ctx.fillStyle = state.unlocked ? '#baffcb' : '#6f7891';
      ctx.font = '900 12px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(t('echo_canvas_exit'), stage.exit.x, stage.exit.y + 4);

      echoPositions.forEach((entity, index) => drawEntity(entity, false, index));
      drawEntity(state.player, true, 0);

      const ratio = Math.max(0, Math.min(1, elapsed / stageDuration()));
      ctx.fillStyle = 'rgba(255,255,255,.07)';
      ctx.fillRect(120, 18, W - 140, 8);
      ctx.fillStyle = elapsed > stageDuration() - 3 ? '#ff6b83' : '#51e6ff';
      ctx.fillRect(120, 18, (W - 140) * ratio, 8);
      ctx.fillStyle = '#9ba5c1';
      ctx.font = '800 10px system-ui';
      ctx.textAlign = 'right';
      ctx.fillText(tr('echo_canvas_total', { loops: state.totalLoops }), W - 20, 42);
    }

    function frame(now) {
      if (!state.active) return;
      if (state.paused) {
        state.lastFrame = now;
        state.animationId = requestAnimationFrame(frame);
        return;
      }
      const elapsed = (now - state.loopStart) / 1000;
      const dt = Math.min(0.08, (now - state.lastFrame) / 1000);
      state.lastFrame = now;

      if (!state.transitioning) {
        let dx = 0;
        let dy = 0;
        if (keys.has('ArrowLeft') || keys.has('a') || keys.has('A')) dx -= 1;
        if (keys.has('ArrowRight') || keys.has('d') || keys.has('D')) dx += 1;
        if (keys.has('ArrowUp') || keys.has('w') || keys.has('W')) dy -= 1;
        if (keys.has('ArrowDown') || keys.has('s') || keys.has('S')) dy += 1;
        movePlayer(dx, dy, dt);

        state.trail.push({ x: state.player.x, y: state.player.y });
        if (state.trail.length > 11) state.trail.shift();
        while (elapsed - state.lastSampleAt >= sampleEvery) {
          state.record.push({ x: state.player.x, y: state.player.y });
          state.lastSampleAt += sampleEvery;
        }
      }

      const echoPositions = state.echoes.map((recording) => entityAt(recording, elapsed));
      const allEntities = [state.player, ...echoPositions];
      const plateStates = stage.plates.map((plate) => allEntities.some((entity) => isOnPlate(entity, plate)));

      plateStates.forEach((on, index) => {
        if (on && !state.prevPlateStates[index]) Sfx.play('energy');
      });
      state.prevPlateStates = plateStates.slice();

      const secondsLeft = Math.ceil(stageDuration() - elapsed);
      if (!state.transitioning && secondsLeft <= 3 && secondsLeft >= 1 && secondsLeft !== state.lastBeep) {
        state.lastBeep = secondsLeft;
        Sfx.play('alarm');
      }

      if (!state.transitioning && !state.unlocked && plateStates.every(Boolean)) {
        state.unlocked = true;
        Sfx.play('lock');
        haptic([20, 30, 40]);
        shakeScreen(false);
        const rect = canvas.getBoundingClientRect();
        const gate = stage.gates[0];
        Fx.burst(rect.left + rect.width * ((gate.x + gate.w / 2) / W), rect.top + rect.height / 2, '#77f2a1', 30);
        echoNotice.textContent = t('echo_all_plates');
        /* V3.7 — 제한시간 80% 이상 소모 후 동기화 성공하면 아슬아슬한 동기화 연출 */
        if (elapsed >= stageDuration() * 0.8) closeCallFx('cyan', t('fx_close_sync'));
      }

      drawWorld(elapsed, echoPositions, plateStates);
      updateHUD(elapsed);

      if (!state.transitioning && state.unlocked && Math.hypot(state.player.x - stage.exit.x, state.player.y - stage.exit.y) <= stage.exit.r - 3) {
        completeStage();
      } else if (!state.transitioning && elapsed >= stageDuration()) {
        commitLoop();
      }

      state.animationId = requestAnimationFrame(frame);
    }

    function onKeyDown(event) {
      if (state.paused) return;
      if (event.key === 'z' || event.key === 'Z') {
        event.preventDefault();
        undoLastLoop();
        return;
      }
      if (event.key === 'e' || event.key === 'E') {
        event.preventDefault();
        commitLoop();
        return;
      }
      if (event.key === 'r' || event.key === 'R') {
        event.preventDefault();
        Sfx.play('click');
        loadStage(state.stageIndex);
        return;
      }
      const allowed = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D'];
      if (!allowed.includes(event.key)) return;
      event.preventDefault();
      keys.add(event.key);
    }

    function onKeyUp(event) { keys.delete(event.key); }

    listen(window, 'keydown', onKeyDown, { passive: false });
    listen(window, 'keyup', onKeyUp);
    root.querySelectorAll('.dpad button').forEach((button) => {
      const key = button.dataset.key;
      listen(button, 'pointerdown', (event) => {
        event.preventDefault();
        keys.add(key);
        button.setPointerCapture?.(event.pointerId);
      });
      const up = () => keys.delete(key);
      listen(button, 'pointerup', up);
      listen(button, 'pointercancel', up);
      listen(button, 'pointerleave', up);
      listen(button, 'click', (event) => {
        if (event.detail !== 0 || state.paused) return;
        keys.add(key);
        setTimeout(() => keys.delete(key), 140);
      });
    });
    listen(undoButton, 'click', () => { Sfx.play('click'); undoLastLoop(); });
    listen(endLoopButton, 'click', () => { Sfx.play('click'); commitLoop(); });
    listen(resetButton, 'click', () => { Sfx.play('click'); loadStage(state.stageIndex); });
    listen(window, 'resize', fitCanvas);

    let resizeObserver = null;
    if ('ResizeObserver' in window) {
      resizeObserver = new ResizeObserver(() => fitCanvas());
      resizeObserver.observe(canvasWrap);
    }


    HelpSystem.attach({
      game: 'echo',
      canOpen: () => !state.transitioning,
      onPause() {
        state.paused = true;
        state.helpPausedAt = performance.now();
        keys.clear();
      },
      onResume() {
        if (!state.active) return;
        const now = performance.now();
        const delta = Math.max(0, now - state.helpPausedAt);
        state.loopStart += delta;
        state.lastFrame = now;
        state.paused = false;
      }
    });

    loadStage(0);
    fitCanvas();
    state.animationId = requestAnimationFrame(frame);
    addCleanup(() => {
      state.active = false;
      cancelAnimationFrame(state.animationId);
      clearTimeout(state.stageTimer);
      keys.clear();
      if (resizeObserver) resizeObserver.disconnect();
    });
  }

  /* ============================================================
     3. DOM Infection V3.3
     - 매 판 랜덤 배치 + 보장 경로
     - 지연 연쇄 감염 애니메이션
     - 콤보 / 긴급 오버클럭 / <style> 은폐
  ============================================================ */
  function renderInfection() {
    const rules = Difficulty.forGame('infection');
    screen.innerHTML = `
      <section class="game-page">
        <div class="game-heading">
          <div>
            <h2>${trh('g_infection_t')}</h2>
            <p>${trh('infect_desc')}</p>
          </div>
          <div class="game-actions">
            <button class="soft-button vgl-help-button" type="button" id="vglHelpButton">${trh('help_button')}</button>
            <button class="danger-button" type="button" id="vglOverclock">${trh('infect_overclock')}</button>
            <button class="ghost-button" type="button" id="vglInfectReset">${trh('infect_new_variant')}</button>
          </div>
        </div>
        <div class="hud hud-five">
          <div class="hud-item"><div class="hud-label">${trh('hud_energy')}</div><div class="hud-value" id="vglEnergy">${rules.energy}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_infected')}</div><div class="hud-value" id="vglInfected">1</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_scan')}</div><div class="hud-value" id="vglScan">0%</div><div class="meter"><span id="vglScanBar"></span><span class="meter-preview" id="vglScanPreview"></span></div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_mutation')}</div><div class="hud-value" id="vglFree">${trh('infect_mutation_value', { free: 0, shield: 0, combo: 0 })}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_variant')}</div><div class="hud-value" id="vglVariant">#0000</div></div>
        </div>
        <div class="notice" id="vglDomNotice">${trh('infect_notice')}</div>
        <div class="dom-board-wrap">
          <div class="dom-grid" id="vglDomGrid"></div>
          <div class="dom-legend">
            <span class="legend-item">${trh('legend_input')}</span>
            <span class="legend-item">${trh('legend_button')}</span>
            <span class="legend-item">${trh('legend_img')}</span>
            <span class="legend-item">${trh('legend_div')}</span>
            <span class="legend-item">${trh('legend_style')}</span>
            <span class="legend-item">${trh('legend_overclock')}</span>
          </div>
        </div>
      </section>`;

    const gridEl = $('#vglDomGrid');
    const energyEl = $('#vglEnergy');
    const infectedEl = $('#vglInfected');
    const scanEl = $('#vglScan');
    const scanBar = $('#vglScanBar');
    const scanPreview = $('#vglScanPreview');
    const freeEl = $('#vglFree');
    const variantEl = $('#vglVariant');
    const noticeEl = $('#vglDomNotice');
    const resetButton = $('#vglInfectReset');
    const overclockButton = $('#vglOverclock');

    const rows = 6;
    const cols = 7;
    const startIndex = 35;
    const targetIndex = RelaySession.active ? RelaySession.BALANCE.infectionTargetIndex : 6;
    const costs = { p: 1, input: 1, button: 1, img: 2, div: 2, style: 3, body: 3, script: 0 };
    const abilityLabels = { input: 'ability_energy', button: 'ability_free', img: 'ability_chain', div: 'ability_shield', style: 'ability_hide', body: 'ability_goal', script: 'ability_start' };

    function makeRng(seed) {
      return function random() {
        seed |= 0;
        seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    const seed = Math.floor(Rng.rand() * 0xffffffff) >>> 0;
    const random = makeRng(seed);
    const variantCode = seed.toString(16).toUpperCase().slice(-4).padStart(4, '0');

    function shuffled(items) {
      const out = items.slice();
      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(random() * (i + 1));
        [out[i], out[j]] = [out[j], out[i]];
      }
      return out;
    }

    function generateGuaranteedPath() {
      let row = Math.floor(startIndex / cols);
      let col = startIndex % cols;
      const targetRow = Math.floor(targetIndex / cols);
      const targetCol = targetIndex % cols;
      let lastDirection = '';
      let streak = 0;
      const path = [row * cols + col];
      while (row > targetRow || col < targetCol) {
        const canUp = row > targetRow;
        const canRight = col < targetCol;
        let direction;
        if (!canUp) direction = 'right';
        else if (!canRight) direction = 'up';
        else if (streak >= 2) direction = lastDirection === 'up' ? 'right' : 'up';
        else direction = random() < 0.5 ? 'up' : 'right';
        if (direction === lastDirection) streak += 1;
        else { lastDirection = direction; streak = 1; }
        if (direction === 'up') row -= 1;
        else col += 1;
        path.push(row * cols + col);
      }
      return path;
    }

    const guaranteedPath = generateGuaranteedPath();
    const tags = Array(rows * cols).fill(null);
    tags[startIndex] = 'script';
    tags[targetIndex] = 'body';
    const routeTags = shuffled(['input', 'p', 'button', 'div', 'p', 'img', 'input', 'p', 'div', 'button']);
    guaranteedPath.slice(1, -1).forEach((index, i) => { tags[index] = routeTags[i]; });
    const weightedPool = ['p', 'p', 'p', 'p', 'input', 'input', 'button', 'button', 'div', 'div', 'img', 'img', 'style'];
    for (let i = 0; i < tags.length; i++) {
      if (!tags[i]) tags[i] = weightedPool[Math.floor(random() * weightedPool.length)];
    }

    const state = {
      active: true,
      energy: rules.energy,
      scan: 0,
      paused: false,
      helpPausedAt: 0,
      previewing: false,
      previewNotice: '',
      freeCharge: 0,
      shield: 0,
      moves: 0,
      elapsedSec: 0,
      combo: 0,
      maxCombo: 0,
      lastMoveAt: 0,
      overclockUsed: false,
      scanFrozenUntil: 0,
      autoTimer: 0,
      infected: new Set([startIndex]),
      pending: new Set(),
      timeouts: new Set()
    };

    variantEl.textContent = `#${variantCode}`;

    function neighbors(index) {
      const row = Math.floor(index / cols);
      const col = index % cols;
      const out = [];
      if (row > 0) out.push(index - cols);
      if (row < rows - 1) out.push(index + cols);
      if (col > 0) out.push(index - 1);
      if (col < cols - 1) out.push(index + 1);
      return out;
    }

    function eligible(index) {
      return !state.infected.has(index) && !state.pending.has(index) && neighbors(index).some((i) => state.infected.has(i));
    }

    function updateHUD() {
      energyEl.textContent = String(state.energy);
      infectedEl.textContent = String(state.infected.size);
      RollingNumber.set(scanEl, Math.min(100, state.scan), (value) => `${Math.floor(value)}%`, 180);
      scanBar.style.width = `${Math.min(100, state.scan)}%`;
      freeEl.textContent = tr('infect_mutation_value', { free: state.freeCharge, shield: state.shield, combo: state.combo });
      scanEl.style.color = state.scan > 75 ? 'var(--vgl-red)' : '';
      overclockButton.disabled = state.overclockUsed || !state.active;
    }

    function projectedScan(index) {
      const tag = tags[index];
      const nextCombo = performance.now() - state.lastMoveAt <= rules.comboWindow ? state.combo + 1 : 1;
      let hit = tag === 'body' ? 8 : 6;
      if (state.shield > 0) hit = 3;
      hit = Math.max(2, hit - Math.min(2, Math.floor((nextCombo - 1) / 2)));
      hit = Math.max(1, Math.ceil(hit * rules.hitScale));
      let after = state.scan + hit;
      if (tag === 'style') after = Math.max(0, after - rules.stylePower);
      return Math.max(0, Math.min(100, after));
    }

    function clearPreview() {
      scanPreview.style.insetInlineStart = '0%';
      scanPreview.style.width = '0%';
      scanPreview.classList.remove('reduces');
      gridEl.querySelectorAll('.dom-node.preview').forEach((node) => node.classList.remove('preview', 'reduces'));
      if (state.previewing) noticeEl.textContent = state.previewNotice;
      state.previewing = false;
      state.previewNotice = '';
    }

    function showPreview(node) {
      if (!node || !state.active || state.paused) return;
      const index = Number(node.dataset.index);
      if (!eligible(index)) return;
      clearPreview();
      state.previewNotice = noticeEl.textContent;
      state.previewing = true;
      const after = projectedScan(index);
      const current = Math.max(0, Math.min(100, state.scan));
      const reduces = after < current;
      scanPreview.classList.toggle('reduces', reduces);
      node.classList.add('preview');
      node.classList.toggle('reduces', reduces);
      if (reduces) {
        scanPreview.style.insetInlineStart = `${after}%`;
        scanPreview.style.width = `${current - after}%`;
      } else {
        scanPreview.style.insetInlineStart = `${current}%`;
        scanPreview.style.width = `${Math.max(0, after - current)}%`;
      }
      noticeEl.textContent = tr(reduces ? 'infect_preview_reduces' : 'infect_preview_scan', {
        tag: `<${tags[index]}>`, before: Math.floor(current), after: Math.floor(after)
      });
    }

    function renderGrid(justIndex) {
      const focused = document.activeElement && document.activeElement.closest ? document.activeElement.closest('.dom-node') : null;
      const focusedIndex = focused ? Number(focused.dataset.index) : null;
      const restoreFocus = Boolean(focused && gridEl.contains(focused));
      gridEl.innerHTML = '';
      tags.forEach((tag, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'dom-node';
        if (state.infected.has(index)) {
          button.classList.add('infected');
          if (index === justIndex) button.classList.add('just');
        } else if (state.pending.has(index)) {
          button.classList.add('pending');
        } else if (eligible(index)) {
          button.classList.add('eligible');
        }
        if (index === targetIndex) button.classList.add('target');
        button.dataset.index = String(index);
        if (abilityLabels[tag]) button.dataset.ability = t(abilityLabels[tag]);
        const status = state.infected.has(index) ? t('status_infected') : state.pending.has(index) ? t('status_pending') : tr('status_cost', { cost: costs[tag] });
        button.innerHTML = `<span class="tag">&lt;${tag}&gt;</span><span class="cost">${status}</span>`;
        button.setAttribute('aria-label', `<${tag}> · ${status}${button.dataset.ability ? ` · ${button.dataset.ability}` : ''}`);
        const isEligible = eligible(index);
        button.setAttribute('aria-disabled', String(!state.infected.has(index) && !state.pending.has(index) && !isEligible));
        button.tabIndex = isEligible ? 0 : -1;
        gridEl.appendChild(button);
      });
      updateHUD();
      if (restoreFocus) requestAnimationFrame(() => {
        const preferred = Number.isFinite(focusedIndex) ? gridEl.querySelector(`[data-index="${focusedIndex}"].eligible`) : null;
        const next = preferred || gridEl.querySelector('.dom-node.eligible');
        if (next) next.focus();
      });
    }

    function burstNode(index, color, count) {
      requestAnimationFrame(() => {
        const node = gridEl.querySelector(`[data-index="${index}"]`);
        if (!node) return;
        const rect = node.getBoundingClientRect();
        Fx.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, color || '#77f2a1', count || 12, 'square');
      });
    }

    function clearManagedTimeouts() {
      state.timeouts.forEach((id) => clearTimeout(id));
      state.timeouts.clear();
    }

    function endGame(win, customTitle, customText) {
      if (!state.active) return;
      state.active = false;
      clearInterval(state.autoTimer);
      clearManagedTimeouts();
      if (win) {
        const score = Math.max(0, Math.round(
          (100 - state.scan) * 58 +
          state.infected.size * 75 +
          Math.max(0, 900 - state.elapsedSec * 18) +
          state.maxCombo * 55 -
          (state.overclockUsed ? 150 : 0)
        ));
        const bestInfo = !RelaySession.active ? submitDifficultyBest('infect_score', score, false) : null;
        const resultStats = {
          scan: state.scan, moves: state.moves, maxCombo: state.maxCombo,
          overclockUsed: state.overclockUsed, infected: state.infected.size
        };
        MetaProfile.record({ game: 'infection', win: true, score, stats: resultStats });
        showResult({
          win: true,
          title: customTitle || t('infect_win_title'),
          text: customText || tr('infect_win_text', { variant: variantCode, scan: Math.floor(state.scan), moves: state.moves }),
          score,
          bestInfo,
          game: 'infection',
          stats: resultStats,
          replay: () => openGame('infection')
        });
      } else {
        const resultStats = {
          scan: state.scan, moves: state.moves, maxCombo: state.maxCombo,
          overclockUsed: state.overclockUsed, infected: state.infected.size
        };
        MetaProfile.record({ game: 'infection', win: false, score: 0, stats: resultStats });
        showResult({
          win: false,
          title: customTitle || t('infect_fail_title'),
          text: customText || tr('infect_fail_text', { nodes: state.infected.size }),
          game: 'infection',
          stats: resultStats,
          replay: () => openGame('infection')
        });
      }
    }

    function chooseChainTarget(index) {
      const options = neighbors(index).filter((i) => !state.infected.has(i) && !state.pending.has(i));
      if (!options.length) return null;
      if (options.includes(targetIndex) && random() < 0.7) return targetIndex;
      return options[Math.floor(random() * options.length)];
    }

    function applyAbility(index, chainDepth) {
      const tag = tags[index];
      let message = tr('infect_node', { tag: `<${tag}>` });
      if (tag === 'input') {
        state.energy += 3;
        message = t('infect_input_msg');
      } else if (tag === 'button') {
        state.freeCharge += 1;
        message = t('infect_button_msg');
      } else if (tag === 'div') {
        state.shield += 1;
        message = t('infect_div_msg');
      } else if (tag === 'style') {
        state.scan = Math.max(0, state.scan - rules.stylePower);
        state.scanFrozenUntil = performance.now() + rules.styleFreeze;
        message = tr('infect_style_msg_dynamic', { power: rules.stylePower, seconds: (rules.styleFreeze / 1000).toFixed(1) });
      } else if (tag === 'img' && chainDepth < rules.maxChainDepth) {
        const target = chooseChainTarget(index);
        if (target !== null) queueFreeInfection(target, chainDepth + 1);
        message = t('infect_img_msg');
      }
      return message;
    }

    function queueFreeInfection(index, chainDepth) {
      if (!state.active || state.infected.has(index) || state.pending.has(index)) return;
      state.pending.add(index);
      renderGrid();
      const scheduleSpread = (delay) => {
        const timeoutId = setTimeout(() => {
          state.timeouts.delete(timeoutId);
          if (!state.active) return;
          if (state.paused) { scheduleSpread(100); return; }
          state.pending.delete(index);
          if (state.infected.has(index)) { renderGrid(); return; }
          state.infected.add(index);
          state.energy += 1;
          Sfx.play('infect');
          renderGrid(index);
          burstNode(index, '#77f2a1', 16);
          const message = applyAbility(index, chainDepth);
          noticeEl.textContent = tr('infect_chain_prefix', { message });
          renderGrid(index);
          if (index === targetIndex || state.infected.has(targetIndex)) {
            endGame(true);
            return;
          }
          checkEnergyState();
        }, delay);
        state.timeouts.add(timeoutId);
      };
      scheduleSpread(180 + chainDepth * 80);
    }

    function checkEnergyState() {
      if (!state.active || state.pending.size) return;
      const candidates = tags.map((_, index) => index).filter(eligible);
      const canMove = candidates.some((index) => state.freeCharge > 0 || state.energy >= costs[tags[index]]);
      if (canMove) return;
      if (!state.overclockUsed) {
        noticeEl.textContent = t('infect_low_energy_hint');
      } else {
        endGame(false, t('infect_energy_fail_title'), t('infect_energy_fail_text'));
      }
    }

    function infect(index, nodeEl, event) {
      if (!state.active || state.paused || !eligible(index)) return;
      clearPreview();
      const tag = tags[index];
      let cost = costs[tag];
      if (state.freeCharge > 0) {
        cost = 0;
        state.freeCharge -= 1;
      }
      if (state.energy < cost) {
        nodeEl.classList.remove('denied');
        void nodeEl.offsetWidth;
        nodeEl.classList.add('denied');
        Sfx.play('error');
        noticeEl.textContent = tr('infect_not_enough', { tag: `<${tag}>`, cost: costs[tag] });
        checkEnergyState();
        return;
      }

      const now = performance.now();
      state.combo = now - state.lastMoveAt <= rules.comboWindow ? state.combo + 1 : 1;
      state.lastMoveAt = now;
      state.maxCombo = Math.max(state.maxCombo, state.combo);
      state.moves += 1;
      state.energy -= cost;
      state.infected.add(index);
      state.energy += 1;

      let scanHit = tag === 'body' ? 8 : 6;
      if (state.shield > 0) {
        scanHit = 3;
        state.shield -= 1;
      }
      scanHit = Math.max(2, scanHit - Math.min(2, Math.floor((state.combo - 1) / 2)));
      scanHit = Math.max(1, Math.ceil(scanHit * rules.hitScale));
      state.scan += scanHit;

      if (state.combo % 4 === 0) {
        state.energy += 1;
        Sfx.play('combo', state.combo);
      } else {
        Sfx.play(tag === 'input' ? 'energy' : 'infect');
      }
      bump(infectedEl);
      if (event) Fx.burst(event.clientX, event.clientY, '#77f2a1', 10, 'square');

      let message = applyAbility(index, 0);
      if (state.combo % 4 === 0) message += tr('infect_combo_bonus', { combo: state.combo });
      noticeEl.textContent = message;
      renderGrid(index);

      if (index === targetIndex || state.infected.has(targetIndex)) {
        endGame(true);
      } else if (state.scan >= 100) {
        state.scan = 100;
        updateHUD();
        endGame(false);
      } else {
        checkEnergyState();
      }
    }

    listen(gridEl, 'click', (event) => {
      const node = event.target.closest('.dom-node');
      if (!node) return;
      infect(Number(node.dataset.index), node, event);
    });
    listen(gridEl, 'pointerover', (event) => showPreview(event.target.closest('.dom-node')));
    listen(gridEl, 'pointerout', (event) => {
      const from = event.target.closest('.dom-node');
      const to = event.relatedTarget && event.relatedTarget.closest ? event.relatedTarget.closest('.dom-node') : null;
      if (from && from !== to) clearPreview();
    });
    listen(gridEl, 'focusin', (event) => showPreview(event.target.closest('.dom-node')));
    listen(gridEl, 'focusout', clearPreview);
    listen(gridEl, 'keydown', (event) => {
      if (!['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(event.key)) return;
      const current = event.target.closest('.dom-node');
      if (!current) return;
      event.preventDefault();
      const index = Number(current.dataset.index);
      const step = event.key === 'ArrowLeft' ? -1 : event.key === 'ArrowRight' ? 1 : event.key === 'ArrowUp' ? -cols : cols;
      let nextIndex = index + step;
      while (nextIndex >= 0 && nextIndex < rows * cols) {
        if ((event.key === 'ArrowLeft' || event.key === 'ArrowRight') && Math.floor(nextIndex / cols) !== Math.floor(index / cols)) break;
        const candidate = gridEl.querySelector(`[data-index="${nextIndex}"]`);
        if (candidate && candidate.classList.contains('eligible')) { candidate.focus(); break; }
        nextIndex += step;
      }
    });

    listen(overclockButton, 'click', () => {
      if (!state.active || state.paused || state.overclockUsed) return;
      state.overclockUsed = true;
      state.energy += rules.overclockEnergy;
      state.scan += rules.overclockScan;
      Sfx.play('energy');
      haptic([20, 25, 20]);
      shakeScreen(false);
      noticeEl.textContent = tr('infect_overclock_msg_dynamic', { energy: rules.overclockEnergy, scan: rules.overclockScan });
      updateHUD();
      if (state.scan >= 100) endGame(false, t('infect_overclock_fail_title'), t('infect_overclock_fail_text'));
    });

    listen(resetButton, 'click', () => { Sfx.play('click'); openGame('infection'); });


    HelpSystem.attach({
      game: 'infection',
      onPause() {
        state.paused = true;
        state.helpPausedAt = performance.now();
        clearPreview();
      },
      onResume() {
        if (!state.active) return;
        const delta = Math.max(0, performance.now() - state.helpPausedAt);
        if (state.scanFrozenUntil > state.helpPausedAt) state.scanFrozenUntil += delta;
        if (state.lastMoveAt > 0) state.lastMoveAt += delta;
        state.paused = false;
      }
    });

    renderGrid();
    noticeEl.textContent = tr('infect_variant_hint', { variant: variantCode });
    state.autoTimer = setInterval(() => {
      if (!state.active || state.paused) return;
      state.elapsedSec += 0.5;
      if (performance.now() < state.scanFrozenUntil) {
        updateHUD();
        return;
      }
      const rate = Math.min(rules.maxScanRate, (0.55 + state.elapsedSec * 0.035) * rules.scanRate);
      state.scan += rate;
      if (state.scan >= 100) {
        state.scan = 100;
        updateHUD();
        endGame(false);
        return;
      }
      updateHUD();
    }, 500);

    addCleanup(() => {
      state.active = false;
      clearInterval(state.autoTimer);
      clearManagedTimeouts();
    });
  }

  /* ============================================================
     4. Do Not Look V3.3
     - 상태 머신 기반 감시자 페이크 패턴
     - 엄폐 체크포인트로 장시간 홀드 우회 방지
     - 복귀 시 배속 이동 리플레이
  ============================================================ */
  function renderUnseen() {
    const rules = Difficulty.forGame('unseen');
    const finishPosition = RelaySession.active ? RelaySession.BALANCE.unseenFinish : 98;
    const visibleCoverCount = RelaySession.active ? 3 : 5;
    const precisionGoal = Math.max(1, visibleCoverCount - 1);
    screen.innerHTML = `
      <section class="game-page">
        <div class="game-heading">
          <div>
            <h2>${trh('g_unseen_t')}</h2>
            <p>${trh('unseen_desc')}</p>
          </div>
          <div class="game-actions">
            <button class="soft-button vgl-help-button" type="button" id="vglHelpButton">${trh('help_button')}</button>
            <button class="ghost-button" type="button" id="vglUnseenReset">${trh('restart')}</button>
          </div>
        </div>
        <div class="hud hud-five">
          <div class="hud-item"><div class="hud-label">${trh('hud_progress')}</div><div class="hud-value" id="vglProgress">5%</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_exposure')}</div><div class="hud-value" id="vglDanger">0%</div><div class="meter"><span id="vglDangerBar"></span></div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_elapsed')}</div><div class="hud-value" id="vglElapsed">${trh('seconds_value', { value: '0.0' })}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_precision')}</div><div class="hud-value" id="vglPrecision">0 / ${precisionGoal}</div></div>
          <div class="hud-item"><div class="hud-label">${trh('hud_watcher')}</div><div class="hud-value" id="vglWatchState">${trh('watcher_scan')}</div></div>
        </div>
        <div class="notice">${trh('unseen_notice')}</div>
        <div class="stealth-room" id="vglRoom">
          <div class="watcher" id="vglWatcher" aria-hidden="true"><div class="pupil"></div></div>
          <div class="stealth-replay-label" id="vglReplayLabel">${trh('unseen_replay_label')}</div>
          <div class="stealth-track" id="vglTrack">
            ${Array.from({ length: visibleCoverCount }, () => `<div class="cover" data-label="${trh('unseen_safe')}"></div>`).join('')}
            <div class="finish-line" title="${trh('unseen_finish_title')}" style="left:${finishPosition}%;right:auto"></div>
            <div class="stealth-player" id="vglPlayer"></div>
          </div>
          <div class="stealth-status" id="vglStealthStatus">${trh('unseen_initial_status')}</div>
          <button class="conceal-button" type="button" id="vglConceal" aria-label="${trh('unseen_conceal_button')}">${trh('unseen_conceal_button')}<br><small>${trh('unseen_conceal_small')}</small></button>
        </div>
      </section>`;

    const playerEl = $('#vglPlayer');
    const progressEl = $('#vglProgress');
    const dangerEl = $('#vglDanger');
    const dangerBar = $('#vglDangerBar');
    const elapsedEl = $('#vglElapsed');
    const precisionEl = $('#vglPrecision');
    const watchStateEl = $('#vglWatchState');
    const watcherEl = $('#vglWatcher');
    const pupilEl = watcherEl.querySelector('.pupil');
    const statusEl = $('#vglStealthStatus');
    const concealButton = $('#vglConceal');
    const resetButton = $('#vglUnseenReset');
    const trackEl = $('#vglTrack');
    const replayLabel = $('#vglReplayLabel');

    const covers = [
      { start: 2.5, end: 9.5 },
      { start: 19, end: 26 },
      { start: 39, end: 46 },
      { start: 61, end: 69 },
      { start: 81.5, end: 88.5 }
    ].slice(0, visibleCoverCount).map((cover) => ({ start: cover.start - rules.coverPad, end: cover.end + rules.coverPad }));
    const speed = rules.speed;
    const state = {
      active: true,
      paused: false,
      helpPausedAt: 0,
      position: 5,
      exposure: 0,
      roundStart: performance.now(),
      concealedSince: null,
      concealStartPos: 5,
      reasons: new Set(),
      replaying: false,
      safeIndex: 0,
      preciseStops: 0,
      lastFrame: performance.now(),
      animationId: 0,
      replayTimer: 0,
      lastExposeBeep: 0,
      message: '',
      messageUntil: 0,
      watcher: {
        pos: -0.82,
        target: 0.82,
        speed: 0.72,
        arrived: false,
        holdUntil: 0,
        nextFakeAt: performance.now() + 2600 + Rng.rand() * 2600,
        fake: false
      }
    };

    trackEl.querySelectorAll('.cover').forEach((element, index) => {
      const cover = covers[index];
      if (!cover) return;
      element.style.left = `${(cover.start + cover.end) / 2}%`;
      element.style.width = `${Math.max(3, cover.end - cover.start)}%`;
    });

    function elapsedTime() {
      const now = state.paused ? state.helpPausedAt : performance.now();
      return Math.max(0, (now - state.roundStart) / 1000);
    }

    function coverIndexAt(position) {
      return covers.findIndex((cover) => position >= cover.start && position <= cover.end);
    }

    function inCover(position) {
      return coverIndexAt(position === undefined ? state.position : position) >= 0;
    }

    function nextCheckpoint() {
      if (state.safeIndex < covers.length - 1) return covers[state.safeIndex + 1];
      return { start: finishPosition - 2, end: finishPosition + 2, finish: true };
    }

    function setMessage(text, duration) {
      state.message = text;
      state.messageUntil = performance.now() + (duration || 1500);
    }

    function chooseWatcherTarget(now) {
      const watcher = state.watcher;
      if (now >= watcher.nextFakeAt) {
        watcher.target = 0;
        watcher.speed = 2.45 + Rng.rand() * 0.55;
        watcher.fake = true;
        watcher.nextFakeAt = now + 3000 + Rng.rand() * 3600;
      } else {
        const direction = watcher.pos >= 0 ? -1 : 1;
        watcher.target = direction * (0.7 + Rng.rand() * 0.26);
        watcher.speed = 0.54 + Rng.rand() * 0.48;
        watcher.fake = false;
      }
    }

    function updateWatcher(now, dt) {
      const watcher = state.watcher;
      if (watcher.arrived) {
        if (now < watcher.holdUntil) return;
        watcher.arrived = false;
        chooseWatcherTarget(now);
      }
      const delta = watcher.target - watcher.pos;
      const amount = watcher.speed * rules.watcherScale * dt;
      if (Math.abs(delta) <= amount) {
        watcher.pos = watcher.target;
        watcher.arrived = true;
        watcher.holdUntil = now + (watcher.fake ? 380 + Rng.rand() * 320 : 150 + Rng.rand() * 560);
      } else {
        watcher.pos += Math.sign(delta) * amount;
      }
    }

    function watcherFacing() {
      return Math.abs(state.watcher.pos) < rules.facingThreshold;
    }

    function updateUI(now) {
      now = now || performance.now();
      playerEl.style.setProperty('--x', `${Math.min(finishPosition, state.position)}%`);
      const shownProgress = RelaySession.active ? state.position / finishPosition * 100 : state.position;
      progressEl.textContent = `${Math.min(100, shownProgress).toFixed(1)}%`;
      dangerEl.textContent = `${Math.min(100, state.exposure * 100).toFixed(0)}%`;
      dangerBar.style.width = `${Math.min(100, state.exposure * 100)}%`;
      elapsedEl.textContent = tr('seconds_value', { value: elapsedTime().toFixed(1) });
      precisionEl.textContent = `${state.preciseStops} / ${precisionGoal}`;

      const facing = watcherFacing();
      if (pupilEl) pupilEl.style.transform = `translateX(${state.watcher.pos * 14}px)`;
      const exposedNow = !state.reasons.size && !state.replaying && !inCover();
      watcherEl.classList.toggle('alert', facing && exposedNow);
      watcherEl.classList.toggle('fake', state.watcher.fake && facing);
      watchStateEl.textContent = state.watcher.fake && facing ? t('watcher_fake') : facing ? t('watcher_front') : t('watcher_scan');
      watchStateEl.style.color = facing ? 'var(--vgl-red)' : 'var(--vgl-muted)';

      if (state.message && now < state.messageUntil) {
        statusEl.textContent = state.message;
      } else if (state.replaying) {
        statusEl.textContent = t('unseen_return_replay');
      } else if (state.reasons.size) {
        statusEl.textContent = t('unseen_hidden_status');
      } else if (inCover()) {
        const next = nextCheckpoint();
        const center = next.finish ? finishPosition : (next.start + next.end) / 2;
        const seconds = Math.max(0, (center - state.position) / speed);
        statusEl.textContent = next.finish
          ? tr('unseen_last_cover', { seconds: seconds.toFixed(1) })
          : tr('unseen_safe_status', { seconds: seconds.toFixed(1) });
      } else {
        statusEl.textContent = facing
          ? t('unseen_watcher_warning')
          : t('unseen_outside');
      }
    }

    function finish(win, title, text) {
      if (!state.active) return;
      state.active = false;
      blackout.classList.remove('active');
      state.reasons.clear();
      state.replaying = false;
      clearTimeout(state.replayTimer);
      cancelAnimationFrame(state.animationId);
      watcherEl.classList.remove('alert', 'fake');
      replayLabel.classList.remove('show');
      Sfx.duck(false);

      let bestInfo = null;
      let score;
      if (win) {
        score = Number(elapsedTime().toFixed(1));
        bestInfo = !RelaySession.active ? submitDifficultyBest('unseen_time', score, true) : null;
      }
      const sRank = win && state.preciseStops >= precisionGoal;
      const resultStats = { preciseStops: state.preciseStops, precisionGoal, exposure: state.exposure, position: state.position, goalPosition: finishPosition, sRank };
      MetaProfile.record({ game: 'unseen', win, score: win ? score : 0, stats: resultStats });
      /* V3.7 — 노출이 임계(0.6) 가까이 찬 채 통과하면 아슬아슬한 성공 연출 후 결과 표시 */
      const closeCall = win && state.exposure >= 0.6;
      const present = () => showResult({ win, title, text, score: win ? score : undefined, bestInfo, game: 'unseen', stats: resultStats, replay: () => openGame('unseen') });
      if (closeCall && !Motion.reduced()) {
        closeCallFx('gold', t('fx_close_call'));
        setTimeout(present, 820);
      } else {
        present();
      }
    }

    function addReplayTrail(from, to) {
      if (Motion.reduced()) return;
      const count = 9;
      for (let i = 1; i <= count; i++) {
        const dot = document.createElement('span');
        dot.className = 'stealth-replay-dot';
        dot.style.left = `${from + (to - from) * (i / (count + 1))}%`;
        dot.style.animationDelay = `${i * 22}ms`;
        trackEl.appendChild(dot);
        setTimeout(() => dot.remove(), 900);
      }
    }

    function playReveal(targetPosition, outcome) {
      const from = state.position;
      state.replaying = true;
      replayLabel.classList.add('show');
      playerEl.classList.add('replaying');
      addReplayTrail(from, targetPosition);
      void playerEl.offsetWidth;
      state.position = targetPosition;
      updateUI();
      Sfx.play('reveal');

      clearTimeout(state.replayTimer);
      state.replayTimer = setTimeout(() => {
        if (!state.active) return;
        state.replaying = false;
        playerEl.classList.remove('replaying');
        replayLabel.classList.remove('show');
        state.exposure = Math.min(1.2, state.exposure + (outcome.penalty || 0));
        if (outcome.message) setMessage(outcome.message, 1900);
        updateUI();

        if (outcome.win) {
          const ratio = state.preciseStops / precisionGoal;
          const grade = ratio >= 1 ? 'S' : ratio >= .75 ? 'A' : ratio >= .5 ? 'B' : 'C';
          finish(true, t('unseen_win_title'), tr('unseen_win_text', { grade, time: elapsedTime().toFixed(1) }));
        } else if (state.exposure >= 1) {
          finish(false, t('unseen_missed_title'), tr('unseen_missed_text', { position: state.position.toFixed(1) }));
        }
      }, 660);
    }

    function revealMovement() {
      if (state.concealedSince === null || state.replaying || !state.active) return;
      const hiddenFor = Math.min(rules.maxHide, (performance.now() - state.concealedSince) / 1000);
      const rawTarget = Math.min(finishPosition, state.concealStartPos + hiddenFor * speed);
      state.concealedSince = null;
      Sfx.duck(false);

      const checkpoint = nextCheckpoint();
      let target = rawTarget;
      const outcome = { penalty: 0, win: false, message: '' };

      if (checkpoint.finish) {
        if (rawTarget >= checkpoint.start) {
          target = finishPosition;
          outcome.win = true;
          outcome.message = t('unseen_finish_reached');
        } else {
          outcome.message = t('unseen_near_finish');
        }
      } else if (rawTarget >= checkpoint.start && rawTarget <= checkpoint.end) {
        state.safeIndex += 1;
        state.preciseStops += 1;
        state.exposure = Math.max(0, state.exposure - rules.precisionRecovery);
        outcome.message = tr('unseen_precision_success', { count: state.preciseStops, goal: precisionGoal });
        Sfx.play('success');
      } else if (rawTarget > checkpoint.end) {
        const overshoot = rawTarget - checkpoint.end;
        target = Math.min(finishPosition, checkpoint.end + rules.overshootClamp);
        state.safeIndex += 1;
        outcome.penalty = Math.min(0.98, rules.overshootBase + overshoot * rules.overshootScale);
        outcome.message = tr('unseen_overshot', { amount: overshoot.toFixed(1) });
        Sfx.play('error');
        haptic(45);
      } else if (rawTarget <= covers[state.safeIndex].end) {
        outcome.message = t('unseen_still_cover');
      } else {
        outcome.message = t('unseen_short');
      }

      playReveal(target, outcome);
    }

    function beginConceal(reason, showBlackout) {
      if (!state.active || state.paused || state.replaying || state.reasons.has(reason)) return;
      if (state.reasons.size === 0) {
        state.concealedSince = performance.now();
        state.concealStartPos = state.position;
        Sfx.duck(true);
      }
      state.reasons.add(reason);
      if (showBlackout) blackout.classList.add('active');
      updateUI();
    }

    function endConceal(reason, hideBlackout) {
      if (!state.reasons.has(reason)) return;
      state.reasons.delete(reason);
      if (hideBlackout) blackout.classList.remove('active');
      if (state.reasons.size === 0) revealMovement();
      updateUI();
    }

    function onVisibility() {
      if (document.hidden) beginConceal('hidden', false);
      else endConceal('hidden', false);
    }

    function onBlur() { beginConceal('blur', false); }
    function onFocus() { endConceal('blur', false); }

    function keyboardConcealEvent(event) {
      const activeElement = document.activeElement;
      const onConcealButton = activeElement === concealButton;
      const onNeutralSurface = !activeElement || activeElement === document.body || activeElement === root || activeElement === screen;
      return (event.code === 'Space' && (onConcealButton || onNeutralSurface)) || (event.key === 'Enter' && onConcealButton);
    }

    function onKeyDown(event) {
      if (keyboardConcealEvent(event) && !event.repeat) {
        event.preventDefault();
        beginConceal('keyboard', true);
      }
    }

    function onKeyUp(event) {
      if (keyboardConcealEvent(event)) {
        event.preventDefault();
        endConceal('keyboard', true);
      }
    }

    function frame(now) {
      if (!state.active) return;
      if (state.paused) {
        state.lastFrame = now;
        state.animationId = requestAnimationFrame(frame);
        return;
      }
      const dt = Math.min(0.05, (now - state.lastFrame) / 1000);
      state.lastFrame = now;
      updateWatcher(now, dt);

      if (state.reasons.size === 0 && !state.replaying) {
        if (inCover()) {
          state.exposure = Math.max(0, state.exposure - dt * 1.65 / rules.exposureScale);
        } else {
          const multiplier = watcherFacing() ? 2.3 : 0.58;
          state.exposure += dt / 0.9 * multiplier * rules.exposureScale;
          if (watcherFacing() && now - state.lastExposeBeep > 330) {
            state.lastExposeBeep = now;

      onPause() {
        state.paused = true;

      onResume() {
        if (!state.active) return;
        const now = performance.now();
        const delta = Math.max(0, now - state.helpPausedAt);
        state.roundStart += delta;
        state.lastFrame = now;
        state.watcher.nextFakeAt += delta;
        state.watcher.holdUntil += delta;
        if (state.messageUntil) state.messageUntil += delta;

  function mulberry32(seed) {
    let state = seed >>> 0;
    return function next() {
      state |= 0;
      state = state + 0x6D2B79F5 | 0;
      let value = Math.imul(state ^ state >>> 15, 1 | state);
      value = value + Math.imul(value ^ value >>> 7, 61 | value) ^ value;
      return ((value ^ value >>> 14) >>> 0) / 4294967296;
    };
  }
  function dailySeed() {
    const date = new Date();
    return Number(`${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`);
  }
  const Rng = {
    fn: nativeRandom,
    seeded: false,
    currentSeed: null,
    seed(value) {
      const normalized = Number(value) >>> 0;
      this.fn = mulberry32(normalized);
      this.seeded = true;
      this.currentSeed = normalized;
      return normalized;
    },
    seedDaily() { return this.seed(dailySeed()); },
    seedNow() {
      this.fn = nativeRandom;
      this.seeded = false;
      this.currentSeed = null;
    },
    rand() { return this.fn(); },
    pick(items) { return items[Math.floor(this.rand() * items.length)]; }
  };
  const DailyChallenge = {
    key: 'daily_enabled',
    enabled: false,
    overrideSeed: null,
    sharedGame: '',
    sharedScore: null,
    load() {
      this.enabled = Store.getRaw(this.key) === '1';
      return this.enabled;
    },
    set(value) {
      this.enabled = Boolean(value);
      if (!this.enabled) {
        this.overrideSeed = null;
        this.sharedGame = '';
        this.sharedScore = null;
      }
      Store.setRaw(this.key, this.enabled ? '1' : '0');
      return this.enabled;
    },
    toggle() {
      const next = !this.enabled;
      this.overrideSeed = null;
      this.sharedGame = '';
      this.sharedScore = null;
      return this.set(next);
    },
    seed() {
      const hasOverride = this.overrideSeed !== null && this.overrideSeed !== '' && Number.isFinite(Number(this.overrideSeed));
      const value = hasOverride ? Number(this.overrideSeed) : dailySeed();
      return Rng.seed(value);
    },
    isShared() { return this.enabled && this.overrideSeed !== null && this.overrideSeed !== '' && Number.isFinite(Number(this.overrideSeed)); },
    parseHash() {
      try {
        const raw = String(window.location.hash || '').replace(/^#/, '');
        if (!raw) return null;
        const params = new URLSearchParams(raw);
        const seed = Number(params.get('daily'));
        const game = String(params.get('g') || '');
        const score = Number(params.get('s'));
        if (!/^\d{8}$/.test(String(seed))) return null;
        this.overrideSeed = seed;
        this.sharedGame = Object.prototype.hasOwnProperty.call(gameInfo, game) ? game : '';
        this.sharedScore = Number.isFinite(score) ? score : null;
        this.set(true);
        return { seed, game: this.sharedGame, score: this.sharedScore };
      } catch (e) { return null; }
    }

      if (win) data.wins += 1;
      if (Number.isFinite(score)) data.total += Math.max(0, Math.round(score));
      const item = data.perGame[game] || { plays: 0, wins: 0, best: null };

      if (win) item.wins += 1;
      const lowerIsBetter = game === 'echo' || game === 'unseen';
      const canSubmit = Number.isFinite(score) && (!lowerIsBetter || win);
      if (canSubmit && (item.best === null || (lowerIsBetter ? score < item.best : score > item.best))) item.best = score;

  const OracleAI = {
    /* BALANCE: transparent ensemble adaptation and history window. */
    BALANCE: Object.freeze({ recentWindow: 20, historyLimit: 600, baseWeight: 0.35, accuracyWeight: 1.65, voteBase: 0.35, voteConfidence: 1.3, maxConfidence: 0.97 }),
    k: 2,
    table: Object.create(null),
    history: [],
    outcomes: [],
    transition: { L: { L: 0, R: 0 }, R: { L: 0, R: 0 } },
    reaction: { win: { L: 0, R: 0 }, loss: { L: 0, R: 0 } },
    totals: { L: 0, R: 0 },
    lastOutcome: '',
    recentAccuracy: { ngram: [], diff: [], reaction: [], bias: [] },
    lastPrediction: null,
    _key() { return this.history.slice(-this.k).join('') || '_'; },
    _accuracy(id) {
      const rows = this.recentAccuracy[id] || [];
      if (!rows.length) return 0.5;
      return rows.reduce((sum, value) => sum + value, 0) / rows.length;
    },
    _weight(id) { return this.BALANCE.baseWeight + this._accuracy(id) * this.BALANCE.accuracyWeight; },
    _choiceFromCounts(counts, fallbackConf) {
      if (!counts || counts.L === counts.R) return { guess: Rng.rand() < 0.5 ? 'L' : 'R', conf: fallbackConf || 0.5, signal: false };
      const total = Math.max(1, counts.L + counts.R);
      const guess = counts.L > counts.R ? 'L' : 'R';
      return { guess, conf: Math.max(counts.L, counts.R) / total, signal: true };
    },
    _models() {
      const context = this._key();
      const ngram = this._choiceFromCounts(this.table[context], 0.5);
      const last = this.history[this.history.length - 1];
      const diffCounts = last ? this.transition[last] : null;
      const diff = this._choiceFromCounts(diffCounts, 0.5);
      const reactionCounts = this.lastOutcome ? this.reaction[this.lastOutcome] : null;
      const reaction = this._choiceFromCounts(reactionCounts, 0.5);
      const bias = this._choiceFromCounts(this.totals, 0.5);
      return [
        { id: 'ngram', labelKey: 'ai_model_ngram', ...ngram },
        { id: 'diff', labelKey: 'ai_model_diff', ...diff },
        { id: 'reaction', labelKey: 'ai_model_reaction', ...reaction },
        { id: 'bias', labelKey: 'ai_model_bias', ...bias }
      ].map((model) => ({ ...model, accuracy: this._accuracy(model.id), rawWeight: this._weight(model.id) }));
    },
    predict() {
      const models = this._models();
      const totalWeight = models.reduce((sum, model) => sum + model.rawWeight, 0) || 1;
      let vote = 0;
      models.forEach((model) => {
        model.weight = model.rawWeight / totalWeight;
        const strength = this.BALANCE.voteBase + Math.abs(model.conf - 0.5) * this.BALANCE.voteConfidence;
        vote += (model.guess === 'R' ? 1 : -1) * model.weight * strength;
      });
      const guess = Math.abs(vote) < 0.0001 ? (Rng.rand() < 0.5 ? 'L' : 'R') : vote > 0 ? 'R' : 'L';
      const conf = Math.max(0.5, Math.min(this.BALANCE.maxConfidence, 0.5 + Math.abs(vote) * 0.5));
      const result = { guess, conf, models, context: this._key() };
      this.lastPrediction = result;
      return result;
    },
    learn(choice, outcome, prediction) {
      const used = prediction && Array.isArray(prediction.models) ? prediction.models : this.lastPrediction?.models || [];
      used.forEach((model) => {
        const rows = this.recentAccuracy[model.id] || (this.recentAccuracy[model.id] = []);
        rows.push(model.guess === choice ? 1 : 0);
        if (rows.length > this.BALANCE.recentWindow) rows.shift();
      });
      const key = this._key();
      const counts = this.table[key] || (this.table[key] = { L: 0, R: 0 });
      counts[choice] += 1;
      const previous = this.history[this.history.length - 1];
      if (previous) this.transition[previous][choice] += 1;
      if (this.lastOutcome) this.reaction[this.lastOutcome][choice] += 1;
      this.totals[choice] += 1;
      this.history.push(choice);
      this.outcomes.push(outcome || '');
      this.lastOutcome = outcome || '';
      if (this.history.length > this.BALANCE.historyLimit) this.history.shift();
      if (this.outcomes.length > this.BALANCE.historyLimit) this.outcomes.shift();
    },
    reset() {
      this.table = Object.create(null);
      this.history = [];
      this.outcomes = [];
      this.transition = { L: { L: 0, R: 0 }, R: { L: 0, R: 0 } };
      this.reaction = { win: { L: 0, R: 0 }, loss: { L: 0, R: 0 } };
      this.totals = { L: 0, R: 0 };
      this.lastOutcome = '';
      this.recentAccuracy = { ngram: [], diff: [], reaction: [], bias: [] };
      this.lastPrediction = null;
    }
  };
