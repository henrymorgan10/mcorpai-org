    const youEl = $('#vglAiYou');
    const aiEl = $('#vglAiAi');
    const roundEl = $('#vglAiRound');
    const confEl = $('#vglAiConf');
    const confBar = $('#vglAiConfBar');
    const streakEl = $('#vglAiStreak');
    const msgEl = $('#vglAiMsg');
    const brainEl = $('#vglAiBrain');
    const ensembleEl = $('#vglAiEnsemble');
    const padEl = $('#vglAiPad');
    const markerL = $('#vglAiPredictL');
    const markerR = $('#vglAiPredictR');
    const fatigueL = $('#vglAiFatigueL');
    const fatigueR = $('#vglAiFatigueR');
    const choiceButtons = [...padEl.querySelectorAll('[data-choice]')];

    function fatigueSide() {
      const length = recentChoices.length;
      const limit = Math.max(1, rules.repeatLimit);
      if (length < limit) return '';
      const side = recentChoices[length - 1];
      return recentChoices.slice(-limit).every((choice) => choice === side) ? side : '';
    }

    function refreshPrediction() {
      pending = OracleAI.predict();
      const pct = Math.round(pending.conf * 100);
      confEl.textContent = `${pct}%`;
      confBar.style.width = `${pct}%`;
      markerL.textContent = pending.guess === 'L' ? tr('ai_predict_marker', { arrow: '◀', conf: pct }) : '';
      markerR.textContent = pending.guess === 'R' ? tr('ai_predict_marker', { arrow: '▶', conf: pct }) : '';
      markerL.classList.toggle('expected', pending.guess === 'L');
      markerR.classList.toggle('expected', pending.guess === 'R');
      const lockedSide = fatigueSide();
      choiceButtons.forEach((button) => {
        const locked = active && button.dataset.choice === lockedSide;
        button.classList.toggle('expected', button.dataset.choice === pending.guess);
        button.disabled = !active || locked;
        button.closest('.ai-choice-wrap')?.classList.toggle('fatigued', locked);
      });
      fatigueL.textContent = lockedSide === 'L' ? t('ai_fatigue') : '';
      fatigueR.textContent = lockedSide === 'R' ? t('ai_fatigue') : '';
      showBrain();
    }

    function showBrain() {
      const models = pending && Array.isArray(pending.models) ? pending.models : OracleAI._models();
      if (ensembleEl) {
        ensembleEl.innerHTML = models.map((model) => {
          const accuracy = Math.round(model.accuracy * 100);
          const weight = Math.round((model.weight === undefined ? model.rawWeight / models.reduce((sum, item) => sum + item.rawWeight, 0) : model.weight) * 100);
          const conf = Math.round(model.conf * 100);
          const arrow = model.guess === 'L' ? '◀' : '▶';
          return `<div class="ai-model-row">
            <div><div class="ai-model-name">${trh(model.labelKey)}</div><div class="ai-model-meta">${trh('ai_model_accuracy', { value: accuracy })} · ${trh('ai_model_weight', { value: weight })}</div></div>
            <div class="ai-model-meter" aria-label="${trh('ai_model_weight', { value: weight })}"><span style="width:${weight}%"></span></div>
            <div class="ai-model-vote">${trh('ai_model_guess', { arrow, conf })}</div>
          </div>`;
        }).join('');
      }
      const entries = Object.entries(OracleAI.table)
        .sort((a, b) => (b[1].L + b[1].R) - (a[1].L + a[1].R))
        .slice(0, AI_BALANCE.visibleRows);
      if (!entries.length) {
        brainEl.innerHTML = `<div class="ai-empty">${trh('ai_brain_empty')}</div>`;
        return;
      }
      brainEl.innerHTML = entries.map(([context, counts]) => {
        const total = Math.max(1, counts.L + counts.R);
        const leftPct = counts.L / total * 100;
        const rightPct = counts.R / total * 100;
        const shownContext = context === '_' ? t('ai_start_context') : context;
        return `<div class="ai-table-row" role="row">
          <span class="ai-context">${escapeHtml(shownContext)}</span>
          <span class="ai-freq"><span style="width:${leftPct}%"></span><b>${trh('ai_freq_left', { count: counts.L })}</b></span>
          <span class="ai-freq right"><span style="width:${rightPct}%"></span><b>${trh('ai_freq_right', { count: counts.R })}</b></span>
        </div>`;
      }).join('');
    }

    function finishDuel(win) {
      if (!active) return;
      active = false;
      choiceButtons.forEach((button) => { button.disabled = true; });
      const bestInfo = !RelaySession.active ? submitDifficultyBest('aiduel_you', you, false) : null;
      const resultStats = {
        maxHighConfStreak: maxHighStreak, rounds: round, round,
        aiScore: ai, ai, you, target: AI_BALANCE.target, k: AiDuelK, fatigueLocks
      };
      MetaProfile.record({ game: 'aiduel', win, score: you, stats: resultStats });
      showResult({
        win,
        title: win ? t('ai_win') : t('ai_lose'),
        text: win ? tr('ai_win_text', { you, ai }) : tr('ai_lose_text', { you, ai }),
        score: you,
        bestInfo,
        game: 'aiduel',
        stats: resultStats,
        replay: () => openGame('aiduel')
      });
    }

    function play(choice, sourceButton) {
      if (!active || paused || !pending || (sourceButton && sourceButton.disabled)) return;
      round += 1;
      const prediction = pending;
      const blocked = prediction.guess === choice;
      if (blocked) {
        const blockPoints = 1 + (prediction.conf >= rules.blockBonusThreshold ? rules.blockBonus : 0);
        ai += blockPoints;
        highStreak = 0;
        msgEl.textContent = blockPoints > 1 ? tr('ai_hit_bonus', { points: blockPoints }) : t('ai_hit');
        shakeScreen(true);
        Sfx.play('block');
        haptic(45);
      } else {
        you += 1;
        highStreak = prediction.conf >= AI_BALANCE.highConfidence ? highStreak + 1 : 0;
        maxHighStreak = Math.max(maxHighStreak, highStreak);
        msgEl.textContent = t('ai_miss');
        const rect = sourceButton.getBoundingClientRect();
        /* V3.7 — 고확신 예측을 연속으로 빗나가게 하면(2연승+) 황금 연출 + 상승 사운드 */
        const hot = highStreak >= 2;
        Fx.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, hot ? '#ffd166' : '#77f2a1', hot ? 30 : 22);
        Sfx.play(hot ? 'milestone' : 'success', highStreak + 2);
        haptic(hot ? 26 : 18);
      }
      const previousLock = fatigueSide();
      OracleAI.learn(choice, blocked ? 'loss' : 'win', prediction);
      recentChoices.push(choice);
      if (recentChoices.length > 6) recentChoices.shift();
      const nextLock = fatigueSide();
      if (nextLock && nextLock !== previousLock) {
        fatigueLocks += 1;
        msgEl.textContent += ` ${tr('ai_fatigue_trigger', { side: t(nextLock === 'L' ? 'ai_left' : 'ai_right') })}`;
      }
      youEl.textContent = String(you);
      aiEl.textContent = String(ai);
      roundEl.textContent = String(round);
      streakEl.textContent = String(highStreak);
      bump(blocked ? aiEl : youEl);
      refreshPrediction();
      if (you >= AI_BALANCE.target) finishDuel(true);
      else if (ai >= AI_BALANCE.target) finishDuel(false);
    }

    listen(padEl, 'click', (event) => {
      const button = event.target.closest('[data-choice]');
      if (!button) return;
      Sfx.resume();
      play(button.dataset.choice, button);
    });
    listen(window, 'keydown', (event) => {
      if (!active || paused || event.repeat) return;
      const lower = event.key.toLowerCase();
      const choice = event.key === 'ArrowLeft' || lower === 'l' || lower === 'a' ? 'L'
        : event.key === 'ArrowRight' || lower === 'r' || lower === 'd' ? 'R' : '';
      if (!choice) return;
      event.preventDefault();
      const button = padEl.querySelector(`[data-choice="${choice}"]`);
      play(choice, button);
    }, { passive: false });
    root.querySelectorAll('.ai-k-button').forEach((button) => {
      listen(button, 'click', () => {
        const nextK = Number(button.dataset.k);
        if (nextK === AiDuelK) return;
        AiDuelK = Math.max(rules.minK, Math.min(3, nextK));
        Sfx.play('click');
        openGame('aiduel');
      });
    });
    listen($('#vglAiReset'), 'click', () => { Sfx.play('click'); openGame('aiduel'); });


    HelpSystem.attach({
      game: 'aiduel',
      onPause() { paused = true; },
      onResume() { if (active) paused = false; }
    });

    showBrain();
    refreshPrediction();
    addCleanup(() => { active = false; });
  }

    function timingFor(recipe) {
      const grade = gradeFor(recipe);
      const base = grade === 'easy'
        ? { learn: 10, recall: 20, score: 100 }
        : grade === 'normal'
          ? { learn: 9, recall: 20, score: 180 }
          : { learn: 8, recall: 22, score: 300 };
      return {
        grade,
        learn: Math.max(5, base.learn + modeRule.learnDelta),
        recall: Math.max(9, base.recall + modeRule.recallDelta),
        score: Math.round(base.score * modeRule.scoreMultiplier),
        recoverableMistakes: modeRule.recoverableMistakes,
        suddenDeath: modeRule.recoverableMistakes === 0
      };
    }

    function loadDailyMission() {
      const fallback = {
        seed: missionSeed, difficulty: Difficulty.current, type: missionType,
        target: missionTarget, progress: 0, complete: false, claimed: false
      };
      const raw = Store.getRaw(missionKey);
      if (raw === null) return fallback;
      try {
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.seed !== missionSeed || parsed.difficulty !== Difficulty.current || parsed.type !== missionType) return fallback;
        const progress = Math.max(0, Math.min(missionTarget, Math.floor(Number(parsed.progress) || 0)));
        return {
          ...fallback,
          progress,
          complete: Boolean(parsed.complete) || progress >= missionTarget,
          claimed: Boolean(parsed.claimed)
        };
      } catch (e) {
        return fallback;
      }
    }

    function saveDailyMission() {
      try { Store.setRaw(missionKey, JSON.stringify(state.dailyMission)); }
      catch (e) {}
    }

    function renderDailyMission() {
      if (!dailyEl || !state.dailyMission) return;
      const mission = state.dailyMission;
      const ratio = Math.max(0, Math.min(1, mission.progress / Math.max(1, mission.target)));
      dailyEl.classList.toggle('hansik-daily-complete', mission.complete);
      dailyEl.innerHTML = `
        <span class="hansik-daily-icon" aria-hidden="true">${mission.complete ? '✅' : '📅'}</span>
        <div class="hansik-daily-copy">
          <strong>${trh(mission.complete ? 'hansik_daily_complete' : 'hansik_daily_title')}</strong>
          <span>${trh(`hansik_daily_mission_${mission.type}`, { target: mission.target })}</span>
          <div class="hansik-daily-meter" aria-hidden="true"><span style="width:${ratio * 100}%"></span></div>
        </div>
        <div class="hansik-daily-value">${trh('hansik_daily_progress', { progress: mission.progress, target: mission.target })}<small>${trh('hansik_daily_reward', { score: modeRule.dailyBonus })}</small></div>`;
    }

    function advanceDailyMission(timing, fastPerfect) {
      const mission = state.dailyMission;
      if (!mission || mission.complete) return 0;
      const increment = mission.type === 'plate'
        ? 1
        : mission.type === 'fast'
          ? (fastPerfect ? 1 : 0)
          : (timing.grade === 'hard' ? 1 : 0);
      if (!increment) return 0;
      mission.progress = Math.min(mission.target, mission.progress + increment);
      let award = 0;
      if (mission.progress >= mission.target) {
        mission.complete = true;
        if (!mission.claimed) {
          mission.claimed = true;
          award = modeRule.dailyBonus;
        }
      }
      saveDailyMission();
      renderDailyMission();
      return award;
    }

    function refillBag() {
      state.drawBag = shuffle(HANSIK_RECIPES.map((_, index) => index));
    }

    function takeRecipe() {
      if (!state.drawBag.length) refillBag();
      let index = state.drawBag.pop();
      if (index === state.lastRecipeIndex && state.drawBag.length) {
        const alternate = state.drawBag.pop();
        state.drawBag.unshift(index);
        index = alternate;
      }
      state.lastRecipeIndex = index;
      return HANSIK_RECIPES[index];
    }

    function rankKey() {
      if (state.plated >= 10) return 'hansik_rank_master';
      if (state.plated >= 6) return 'hansik_rank_chef';
      if (state.plated >= 3) return 'hansik_rank_assistant';
      return 'hansik_rank_apprentice';
    }

    function policyText() {
      return modeRule.recoverableMistakes > 0
        ? tr('hansik_policy_retry', { n: modeRule.recoverableMistakes })
        : t('hansik_policy_sudden');
    }

    function updateHUD() {
      RollingNumber.set(scoreEl, state.score, (value) => formatNumber(Math.round(value)), 190);
      platedEl.textContent = String(state.plated);
      failsEl.textContent = `${state.failures} / ${MAX_FAILURES}`;
      comboEl.textContent = tr('hansik_combo_value', { n: state.combo });
      roundEl.textContent = state.round ? tr('hansik_round', { n: state.round }) : '—';
      failsEl.style.color = state.failures >= 2 ? 'var(--vgl-red)' : '';
      comboEl.style.color = state.combo >= 3 ? 'var(--vgl-yellow)' : '';
      stageEl.dataset.score = String(state.score);
      stageEl.dataset.fastPlates = String(state.fastPlates);
      stageEl.dataset.failures = String(state.failures);
    }

    function setStageMeta(recipe, phaseKey) {
      const parts = [];
      if (recipe) {
        const timing = timingFor(recipe);
        parts.push(`<span class="hansik-pill hansik-${timing.grade}">${trh('hansik_recipe_grade', { grade: t(`hansik_grade_${timing.grade}`), count: recipe.steps.length })}</span>`);
        parts.push(`<span class="hansik-pill">${trh('hansik_popular_rank', { rank: recipe.rank })}</span>`);
        stageEl.dataset.learnSeconds = String(timing.learn);
        stageEl.dataset.recallSeconds = String(timing.recall);
      } else {
        parts.push(`<span class="hansik-pill">🍚 ${trh('chip_hansik_20')}</span>`);
      }
      stageEl.dataset.scoreMultiplier = String(modeRule.scoreMultiplier);
      stageEl.dataset.retryAllowance = String(modeRule.recoverableMistakes);
      parts.push(`<span class="hansik-pill ${modeRule.recoverableMistakes ? 'hansik-retry' : 'hansik-sudden'}">${escapeHtml(policyText())}</span>`);
      parts.push(`<span class="hansik-pill hansik-score-mode">${trh('hansik_policy_score', { mult: modeRule.scoreMultiplier.toFixed(2).replace(/0+$/, '').replace(/\.$/, '') })}</span>`);
      if (currentRunSeed !== null) parts.push(`<span class="hansik-pill">${trh('hansik_daily_seed', { seed: currentRunSeed })}</span>`);
      badgesEl.innerHTML = parts.join('');
      liveEl.textContent = phaseKey ? t(phaseKey) : tr('hansik_round', { n: state.round });
    }

    function recipeList(recipe) {
      return `<ol class="hansik-recipe-list">${recipe.steps.map((step, index) => {
        const name = t(`hansik_ing_${step.key}`);
        return `<li class="hansik-recipe-item" data-step-key="${escapeHtml(step.key)}">
          <span class="hansik-step-number">${index + 1}</span>
          <span class="hansik-step-emoji" aria-hidden="true">${step.emoji}</span>
          <span class="hansik-step-name">${escapeHtml(name)}</span>
        </li>`;
      }).join('')}</ol>`;
    }

    function dishCard(recipe, showMethod, reveal) {
      return `<article class="hansik-dish-card ${reveal ? 'hansik-reveal' : ''}">
        <div class="hansik-food-emoji" aria-hidden="true">${recipe.emoji}</div>
        <h3 class="hansik-food-name">${trh(`hansik_food_${recipe.id}`)}</h3>
        <div class="hansik-food-rank">${trh('hansik_popular_rank', { rank: recipe.rank })}</div>
        ${showMethod ? `<div class="hansik-method"><strong>${trh('hansik_method')}</strong>${trh(`hansik_recipe_${recipe.id}`)}</div>` : ''}
      </article>`;
    }

    function timerMarkup(labelKey, seconds) {
      return `<div class="hansik-timer-box">
        <div class="hansik-timer-value" id="vglHansikTime" data-hansik-timer-value>${trh('hansik_time', { s: Math.ceil(seconds) })}</div>
        <div class="hansik-timer-label">${trh(labelKey)}</div>
      </div>`;
    }

    function floatBonus(text, daily) {
      if (!state.active || !text) return;
      const node = document.createElement('div');
      node.className = `hansik-float-bonus ${daily ? 'hansik-daily-float' : ''}`;
      node.textContent = text;
      stageEl.appendChild(node);
      later(() => node.remove(), Motion.reduced() ? 900 : 1500);
    }

    function renderReady() {
      if (!state.active) return;
      setPhase('ready');
      state.current = null;
      state.nextIndex = 0;
      state.roundMistakes = 0;
      stageEl.classList.remove('hansik-success', 'hansik-failure');
      setStageMeta(null, 'hansik_draw_btn');
      noticeEl.textContent = t('hansik_draw_hint');
      const multiplier = modeRule.scoreMultiplier.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
      mainEl.innerHTML = `<div class="hansik-ready">
        <div class="hansik-ready-emoji" aria-hidden="true">🍚🎰🥢</div>
        <h3>${trh('hansik_ready_title')}</h3>
        <p>${trh('hansik_ready_copy')}</p>
        <p class="hansik-mode-summary">${trh('hansik_mode_summary', { policy: policyText(), mult: multiplier, bonus: formatNumber(modeRule.fastBonus) })}</p>
        <p class="hansik-ready-note">${trh('hansik_draw_hint')}</p>
        <button class="hansik-draw-btn" id="vglHansikDraw" type="button" data-hansik-action="draw">${trh('hansik_draw_btn')}</button>
        <div class="hansik-keyboard">${trh('hansik_keyboard_hint')}</div>
      </div>`;
      updateHUD();
      renderDailyMission();
      requestAnimationFrame(() => mainEl.querySelector('[data-hansik-action="draw"]')?.focus());
    }

    function renderDrawing() {
      setPhase('drawing');
      stageEl.classList.remove('hansik-success', 'hansik-failure');
      setStageMeta(state.current, 'hansik_drawing');
      noticeEl.textContent = t('hansik_drawing');
      mainEl.innerHTML = `<div class="hansik-roulette" role="status" aria-live="polite">
        <div class="hansik-roulette-window">
          <div>
            <div class="hansik-roulette-emoji" data-hansik-roulette-emoji>🍚</div>
            <div class="hansik-roulette-name" data-hansik-roulette-name>${trh('hansik_drawing')}</div>
          </div>
        </div>
        <div><h3>${trh('hansik_drawing')}</h3><p>${trh('hansik_roulette_sub')}</p></div>
      </div>`;
    }

    function startDraw() {
      if (!state.active || state.paused || state.phase !== 'ready') return;
      state.current = takeRecipe();
      state.round += 1;
      state.roundMistakes = 0;
      state.lastFastBonus = 0;
      state.lastDailyBonus = 0;
      updateHUD();
      renderDrawing();
      Sfx.play('go');
      let tick = Math.floor(Rng.rand() * HANSIK_RECIPES.length);
      let step = 0;
      const totalSteps = Motion.reduced() ? 4 : 10;
      const spin = () => {
        if (!state.active || state.phase !== 'drawing') return;
        tick = (tick + 3 + (step % 2)) % HANSIK_RECIPES.length;
        const preview = HANSIK_RECIPES[tick];
        const emoji = mainEl.querySelector('[data-hansik-roulette-emoji]');
        const name = mainEl.querySelector('[data-hansik-roulette-name]');
        if (emoji) emoji.textContent = preview.emoji;
        if (name) name.textContent = t(`hansik_food_${preview.id}`);
        Sfx.play('countdown');
        step += 1;
        const progress = step / totalSteps;
        const delay = Motion.reduced() ? 90 : 45 + Math.round(190 * progress * progress);
        if (step < totalSteps) {
          later(spin, delay);
          return;
        }
        later(() => {
          if (!state.active || state.phase !== 'drawing') return;
          const finalEmoji = mainEl.querySelector('[data-hansik-roulette-emoji]');
          const finalName = mainEl.querySelector('[data-hansik-roulette-name]');
          if (finalEmoji) finalEmoji.textContent = state.current.emoji;
          if (finalName) finalName.textContent = t(`hansik_food_${state.current.id}`);
          Sfx.play('lock');
          haptic(20);
          later(renderLearning, Motion.reduced() ? 70 : 230);
        }, delay);
      };
      spin();
    }

    function renderLearning() {
      if (!state.active || !state.current || state.phase !== 'drawing') return;
      const timing = timingFor(state.current);
      setPhase('learning');
      state.phaseDuration = timing.learn;
      state.phaseEndsAt = performance.now() + timing.learn * 1000;
      state.lastWarnSecond = -1;
      setStageMeta(state.current, 'hansik_phase_learn');
      noticeEl.textContent = t('hansik_learn_hint');
      mainEl.innerHTML = `<div class="hansik-challenge">
        ${dishCard(state.current, true, true)}
        <section class="hansik-work-card">
          <div class="hansik-work-head">
            <div><h3>${trh('hansik_learn_hint')}</h3><p>${trh('hansik_ingredients')}</p></div>
            ${timerMarkup('hansik_phase_learn', timing.learn)}
          </div>
          <div class="hansik-timer-bar" data-hansik-timer-bar><span></span></div>
          ${recipeList(state.current)}
        </section>
      </div>`;
      Sfx.play('reveal');
    }

    function renderRecall() {
      if (!state.active || !state.current || state.phase !== 'learning') return;
      const timing = timingFor(state.current);
      setPhase('recall');
      state.nextIndex = 0;
      state.roundMistakes = 0;
      state.phaseDuration = timing.recall;
      state.recallStartedAt = performance.now();
      state.phaseEndsAt = state.recallStartedAt + timing.recall * 1000;
      state.lastWarnSecond = -1;
      const shuffled = shuffle(state.current.steps);
      setStageMeta(state.current, 'hansik_phase_recall');
      noticeEl.textContent = t('hansik_first_step');
      const slots = state.current.steps.map((step, index) => `<div class="hansik-slot" data-hansik-slot="${index}" data-number="${index + 1}" aria-label="${trh('hansik_a11y_slot_empty', { n: index + 1 })}">
        <span class="hansik-slot-emoji" aria-hidden="true">·</span><span class="hansik-slot-name">${index + 1}</span>
      </div>`).join('');
      const buttons = shuffled.map((step, index) => {
        const name = t(`hansik_ing_${step.key}`);
        const shortcut = index === 9 ? 0 : index + 1;
        const answerIndex = state.current.steps.indexOf(step);
        return `<button class="hansik-ing-btn" type="button" data-hansik-key="${escapeHtml(step.key)}" data-hansik-position="${index}" data-step-index="${answerIndex}" aria-label="${trh('hansik_a11y_ingredient', { name })}">
          <span class="hansik-ing-emoji" aria-hidden="true">${step.emoji}</span>
          <span class="hansik-ing-name">${escapeHtml(name)}</span>
          <span class="hansik-keycap" aria-hidden="true">${shortcut}</span>
        </button>`;
      }).join('');
      mainEl.innerHTML = `<div class="hansik-challenge">
        ${dishCard(state.current, false, true)}
        <section class="hansik-work-card">
          <div class="hansik-work-head">
            <div><h3>${trh('hansik_recall_hint')}</h3><p>${trh('hansik_keyboard_hint')}</p></div>
            ${timerMarkup('hansik_phase_recall', timing.recall)}
          </div>
          <div class="hansik-timer-bar" data-hansik-timer-bar><span></span></div>
          <div class="hansik-slots" role="list">${slots}</div>
          <div class="hansik-ingredient-grid">${buttons}</div>
          <div class="hansik-recall-status"><span data-hansik-next>${trh('hansik_next_step', { n: 1 })}</span><span data-hansik-policy>${timing.suddenDeath ? trh('hansik_policy_sudden') : trh('hansik_retries_left', { n: timing.recoverableMistakes })}</span></div>
        </section>
      </div>`;
      Sfx.play('go');
      requestAnimationFrame(() => mainEl.querySelector('.hansik-ing-btn:not(:disabled)')?.focus());
    }

    function fillSlot(step, index) {
      const slot = mainEl.querySelector(`[data-hansik-slot="${index}"]`);
      if (!slot) return;
      const name = t(`hansik_ing_${step.key}`);
      slot.classList.add('hansik-filled');
      const emoji = slot.querySelector('.hansik-slot-emoji');
      const label = slot.querySelector('.hansik-slot-name');
      if (emoji) emoji.textContent = step.emoji;
      if (label) label.textContent = name;
      slot.setAttribute('aria-label', tr('hansik_a11y_slot_filled', { n: index + 1, name }));
    }

    function flashExpectedSlot() {
      const slot = mainEl.querySelector(`[data-hansik-slot="${state.nextIndex}"]`);
      if (!slot) return;
      slot.classList.remove('hansik-hint-flash');
      void slot.offsetWidth;
      slot.classList.add('hansik-hint-flash');
      later(() => slot.classList.remove('hansik-hint-flash'), 520);
    }

    function animateWrong(button) {
      if (!button) return;
      button.classList.remove('hansik-wrong');
      void button.offsetWidth;
      button.classList.add('hansik-wrong');
      later(() => button.classList.remove('hansik-wrong'), 520);
    }

    function continueAfterReveal() {
      if (!state.active || state.phase !== 'transition' || state.failures >= MAX_FAILURES) return;
      if (state.transitionSuccess) {
        setPhase('ready');
        startDraw();
      } else {
        renderReady();
      }
    }

    function revealRound(success, reason) {
      if (!state.active || !state.current) return;
      setPhase('transition');
      state.transitionSuccess = success;
      const failed = !success;
      stageEl.classList.toggle('hansik-success', success);
      stageEl.classList.toggle('hansik-failure', failed);
      setStageMeta(state.current, success ? 'hansik_cleared' : reason === 'timeup' ? 'hansik_timeup' : 'hansik_wrong');
      const titleKey = success ? 'hansik_cleared' : reason === 'timeup' ? 'hansik_timeup' : 'hansik_wrong';
      const copyKey = success ? 'hansik_reveal_success' : reason === 'timeup' ? 'hansik_reveal_timeup' : 'hansik_reveal_wrong';
      noticeEl.textContent = t(copyKey);
      mainEl.innerHTML = `<div class="hansik-reveal-panel ${failed ? 'hansik-failed' : ''}">
        <div class="hansik-reveal-icon" aria-hidden="true">${success ? state.current.emoji : reason === 'timeup' ? '⏱️' : '💥'}</div>
        <h3>${trh(titleKey)}</h3>
        <p class="hansik-reveal-copy">${trh(copyKey)}</p>
        ${success ? `<p class="hansik-reveal-score">${trh('hansik_score_gain', { score: formatNumber(state.lastGain), combo: state.combo })}</p><p class="hansik-auto-next">${trh('hansik_auto_next')}</p>` : ''}
        ${recipeList(state.current)}
        <div class="hansik-method"><strong>${trh('hansik_method')}</strong>${trh(`hansik_recipe_${state.current.id}`)}</div>
        ${state.failures < MAX_FAILURES ? `<button class="primary-button hansik-next-btn" type="button" data-hansik-action="next">${trh(success ? 'hansik_next_now' : 'hansik_next_draw')}</button>` : ''}
      </div>`;
      requestAnimationFrame(() => mainEl.querySelector('[data-hansik-action="next"]')?.focus());
      if (state.failures >= MAX_FAILURES) {
        later(finishGame, Motion.reduced() ? 420 : 1650);
      } else {
        later(() => {
          if (state.phase !== 'transition') return;
          if (success) continueAfterReveal();
          else renderReady();
        }, success ? 3000 : 2100);
      }
    }

    function completeRound() {
      if (!state.active || !state.current || state.phase !== 'transition') return;
      const timing = timingFor(state.current);
      const recallElapsed = Math.max(0, (performance.now() - state.recallStartedAt) / 1000);
      const fastPerfect = state.roundMistakes === 0 && recallElapsed <= 5;
      state.combo += 1;
      state.maxCombo = Math.max(state.maxCombo, state.combo);
      state.plated += 1;
      if (state.roundMistakes === 0) state.perfectPlates += 1;
      if (fastPerfect) state.fastPlates += 1;
      if (timing.grade === 'hard') state.hardClears += 1;
      const multiplier = 1 + Math.min(1.25, Math.max(0, state.combo - 1) * 0.25);
      const gradeTimeFactor = timing.grade === 'hard' ? 1.15 : 1;
      const timeBonus = Math.round(state.successRemaining * modeRule.timePoint * gradeTimeFactor);
      state.lastFastBonus = fastPerfect ? modeRule.fastBonus : 0;
      state.lastDailyBonus = advanceDailyMission(timing, fastPerfect);
      state.lastGain = Math.round(timing.score * multiplier + timeBonus + state.lastFastBonus + state.lastDailyBonus);
      state.score += state.lastGain;
      updateHUD();
      revealRound(true, 'success');
      Sfx.play(fastPerfect ? 'perfect' : state.combo % 3 === 0 ? 'milestone' : 'success', state.combo + 2);
      haptic(state.combo >= 3 ? [16, 24, 20] : 18);
      if (state.lastFastBonus) floatBonus(tr('hansik_fast_plating', { score: formatNumber(state.lastFastBonus) }), false);
      if (state.lastDailyBonus) floatBonus(tr('hansik_daily_bonus', { score: formatNumber(state.lastDailyBonus) }), true);
      requestAnimationFrame(() => {
        const rect = stageEl.getBoundingClientRect();
        Fx.ring(rect.left + rect.width / 2, rect.top + rect.height / 2, '#ffd166', 24);
        Fx.confetti(fastPerfect || state.combo >= 3 ? 82 : 48);
      });
    }

    function failRound(reason) {
      if (!state.active || state.phase !== 'recall') return;
      setPhase('transition');
      state.failures += 1;
      state.combo = 0;
      updateHUD();
      Sfx.play('fail');
      haptic(65);
      shakeScreen(true);
      later(() => revealRound(false, reason), Motion.reduced() ? 40 : 220);
    }

    function registerWrong(button) {
      if (!state.active || state.paused || state.phase !== 'recall' || !state.current) return;
      const timing = timingFor(state.current);
      state.failures += 1;
      state.roundMistakes += 1;
      state.combo = 0;
      animateWrong(button);
      flashExpectedSlot();
      updateHUD();
      const retriesLeft = Math.max(0, timing.recoverableMistakes - state.roundMistakes);
      const endsDish = timing.suddenDeath || state.roundMistakes > timing.recoverableMistakes || state.failures >= MAX_FAILURES;
      Sfx.play(endsDish ? 'fail' : 'block');
      haptic(endsDish ? [50, 30, 50] : 32);
      shakeScreen(endsDish);
      if (endsDish) {
        noticeEl.textContent = timing.suddenDeath ? t('hansik_sudden_fail') : t('hansik_wrong');
        setPhase('transition');
        later(() => revealRound(false, 'wrong'), Motion.reduced() ? 40 : 300);
        return;
      }
      state.recoveredMistakes += 1;
      noticeEl.textContent = tr(retriesLeft > 0 ? 'hansik_mistake_continue' : 'hansik_mistake_last', {
        used: state.failures,
        step: state.nextIndex + 1
      });
      const policyEl = mainEl.querySelector('[data-hansik-policy]');
      if (policyEl) policyEl.textContent = tr('hansik_retries_left', { n: retriesLeft });
      requestAnimationFrame(() => button?.focus());
    }

    function selectIngredient(button) {
      if (!state.active || state.paused || state.phase !== 'recall' || !state.current || !button || button.disabled) return;
      const expected = state.current.steps[state.nextIndex];
      if (!expected || button.dataset.hansikKey !== expected.key) {
        registerWrong(button);
        return;
      }
      button.disabled = true;
      button.classList.add('hansik-correct');
      fillSlot(expected, state.nextIndex);
      state.nextIndex += 1;
      const rect = button.getBoundingClientRect();
      Fx.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, '#77f2a1', 14, 'circle');
      Sfx.play('energy');
      haptic(12);
      const nextEl = mainEl.querySelector('[data-hansik-next]');
      if (state.nextIndex >= state.current.steps.length) {
        state.successRemaining = Math.max(0, (state.phaseEndsAt - performance.now()) / 1000);
        setPhase('transition');
        if (nextEl) nextEl.textContent = tr('hansik_all_steps', { count: state.current.steps.length });
        noticeEl.textContent = t('hansik_correct');
        later(completeRound, Motion.reduced() ? 35 : 220);
      } else {
        if (nextEl) nextEl.textContent = tr('hansik_next_step', { n: state.nextIndex + 1 });
        noticeEl.textContent = tr('hansik_step_ok', { n: state.nextIndex });
        mainEl.querySelector('.hansik-ing-btn:not(:disabled)')?.focus();
      }
    }

    function finishGame() {
      if (!state.active) return;
      state.active = false;
      setPhase('gameover');
      clearManagedTimers();
      cancelAnimationFrame(state.animationId);
      const master = state.plated >= 10;
      const rank = t(rankKey());
      const bestInfo = !RelaySession.active ? submitDifficultyBest('hansik_score', state.score, false) : null;
      const resultStats = {
        plated: state.plated, rounds: state.round, round: state.round,
        failures: state.failures, maxCombo: state.maxCombo,
        hardClears: state.hardClears, score: state.score, rank,
        fastPlates: state.fastPlates, perfectPlates: state.perfectPlates,
        recoveredMistakes: state.recoveredMistakes,
        dailyMissionComplete: Boolean(state.dailyMission && state.dailyMission.complete),
        dailyMissionType: state.dailyMission ? state.dailyMission.type : '',
        dailyMissionProgress: state.dailyMission ? state.dailyMission.progress : 0,
        dailyMissionTarget: state.dailyMission ? state.dailyMission.target : 0,
        difficulty: Difficulty.current, suddenDeath: modeRule.recoverableMistakes === 0
      };
      MetaProfile.record({ game: 'hansik', win: master, score: state.score, stats: resultStats });
      showResult({
        win: master,
        title: t(master ? 'hansik_win_t' : 'hansik_gameover_t'),
        text: tr(master ? 'hansik_win_x' : 'hansik_gameover_x', { n: state.plated, score: formatNumber(state.score), rank }),
        score: state.score,
        bestInfo,
        game: 'hansik',
        stats: resultStats,
        replay: () => openGame('hansik')
      });
    }

    function updateTimer(now) {
      if (state.paused || (state.phase !== 'learning' && state.phase !== 'recall')) return;
      const remaining = Math.max(0, (state.phaseEndsAt - now) / 1000);
      const ratio = state.phaseDuration > 0 ? Math.max(0, Math.min(1, remaining / state.phaseDuration)) : 0;
      const valueEl = mainEl.querySelector('[data-hansik-timer-value]');
      const bar = mainEl.querySelector('[data-hansik-timer-bar]');
      const fill = bar?.querySelector('span');
      if (valueEl) valueEl.textContent = tr('hansik_time', { s: Math.ceil(remaining) });
      if (fill) fill.style.width = `${ratio * 100}%`;
      if (bar) bar.classList.toggle('hansik-danger', ratio <= 0.25);
      const warningSecond = Math.ceil(remaining);
      const warningWindow = modeRule.recoverableMistakes === 0 ? 5 : 3;
      if (remaining > 0 && warningSecond <= warningWindow && warningSecond !== state.lastWarnSecond) {
        state.lastWarnSecond = warningSecond;
        Sfx.play('countdown');
        haptic(10);
      }
      if (remaining <= 0) {
        if (state.phase === 'learning') renderRecall();
        else failRound('timeup');
      }
    }

    function frame(now) {
      if (!state.active) return;
      updateTimer(now);
      state.animationId = requestAnimationFrame(frame);
    }

    listen(mainEl, 'click', (event) => {
      const action = event.target.closest('[data-hansik-action]')?.dataset.hansikAction;
      if (action === 'draw') { Sfx.resume(); startDraw(); return; }
      if (action === 'next') { Sfx.play('click'); continueAfterReveal(); return; }
      const ingredient = event.target.closest('.hansik-ing-btn');
      if (ingredient) selectIngredient(ingredient);
    });

    listen(window, 'keydown', (event) => {
      if (!state.active || state.paused || state.phase !== 'recall' || event.repeat) return;
      if (/^[0-9]$/.test(event.key)) {
        const position = event.key === '0' ? 9 : Number(event.key) - 1;
        const button = mainEl.querySelector(`[data-hansik-position="${position}"]`);
        if (button) {
          event.preventDefault();
          button.click();
        }
        return;
      }
      if (!['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(event.key)) return;
      const buttons = [...mainEl.querySelectorAll('.hansik-ing-btn:not(:disabled)')];
      if (!buttons.length) return;
      event.preventDefault();
      const activeIndex = buttons.indexOf(document.activeElement);
      const rtl = root.dir === 'rtl';
      const delta = event.key === 'ArrowLeft' ? (rtl ? 1 : -1)
        : event.key === 'ArrowRight' ? (rtl ? -1 : 1)
          : event.key === 'ArrowUp' ? -2 : 2;
      const next = ((activeIndex < 0 ? 0 : activeIndex) + delta + buttons.length) % buttons.length;
      buttons[next].focus();
    }, { passive: false });

    listen(resetButton, 'click', () => { Sfx.play('click'); openGame('hansik'); });

    HelpSystem.attach({
      game: 'hansik',
      canOpen: () => state.active && !['drawing', 'transition', 'gameover'].includes(state.phase),
      onPause() {
        if (!state.active || state.paused) return;
        state.paused = true;
        state.pauseStarted = performance.now();
      },
      onResume() {
        if (!state.active || !state.paused) return;
        const now = performance.now();
        const pausedFor = Math.max(0, now - state.pauseStarted);
        if (state.phase === 'learning' || state.phase === 'recall') state.phaseEndsAt += pausedFor;
        if (state.phase === 'recall') state.recallStartedAt += pausedFor;
        state.paused = false;
      }
    });

    state.dailyMission = loadDailyMission();
    renderDailyMission();
    renderReady();
    state.animationId = requestAnimationFrame(frame);
    addCleanup(() => {
      state.active = false;
      clearManagedTimers();
      cancelAnimationFrame(state.animationId);
      stageEl.classList.remove('hansik-success', 'hansik-failure');
    });
  }

  Object.assign(Games, {
    hansik: { init: renderHansik },
    notifications: { init: renderNotifications },
    echo: { init: renderEcho },
    infection: { init: renderInfection },
    unseen: { init: renderUnseen },
    aiduel: { init: renderAiDuel }
  });

  MetaProfile.load();
  DailyChallenge.load();
  const sharedChallenge = DailyChallenge.parseHash();
  const savedLanguage = Store.getRaw('language');
  applyLanguage(I18N[savedLanguage] ? savedLanguage : 'en', false);
  showMenu();
  if (sharedChallenge && sharedChallenge.game) requestAnimationFrame(() => openGame(sharedChallenge.game));
})();
</script>
